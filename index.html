<!DOCTYPE html>

<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DesertReach Rescue Relay coordinates the nearest suitable community responder and specialist backup for rural emergencies.">
  <title>DesertReach Rescue Relay | Tatweer Challenge 2</title>

  <style>
    :root {
      --green: #0a7667;
      --green2: #0d8f7b;
      --dark: #063f37;
      --mint: #dff5ef;
      --bg: #f5faf7;
      --ink: #16211f;
      --muted: #66736f;
      --line: #dfe8e4;
      --red: #cf4040;
      --success: #17894f;
      --amber: #c67a14;
      --amber-bg: #fff6e8;
      --blue: #2b6cb0;
      --sand: #f3e4c6;
      --white: #ffffff;
      --shadow: 0 18px 48px rgba(18, 58, 49, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, #fffdf8, var(--bg));
      font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .notice {
      padding: 9px 16px;
      text-align: center;
      color: #ffffff;
      background: var(--dark);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: auto;
      padding-bottom: 46px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 0 17px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      position: relative;
      display: grid;
      place-items: center;
      flex: 0 0 56px;
      width: 56px;
      height: 56px;
      overflow: hidden;
      border-radius: 18px;
      color: #ffffff;
      background: linear-gradient(145deg, var(--green2), var(--dark));
      box-shadow:
        0 12px 28px rgba(10, 118, 103, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .logo::after {
      content: "";
      position: absolute;
      top: -16px;
      right: -16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .logo img {
      position: relative;
      z-index: 1;
      display: block;
      width: 82%;
      height: 82%;
      object-fit: contain;
      object-position: center;
      border-radius: 13px;
      transform: translate(0, 0);
    }

    .brand h1 {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 650;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .nav button {
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      color: var(--dark);
      font-weight: 850;
    }

    .nav button.active {
      color: #ffffff;
      background: var(--green);
      border-color: var(--green);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(260px, 0.55fr);
      gap: clamp(28px, 5vw, 58px);
      align-items: center;
      padding: clamp(34px, 5vw, 58px);
      border-radius: 30px;
      color: #ffffff;
      background: linear-gradient(112deg, #064c43 0%, var(--dark) 38%, var(--green2) 100%);
      box-shadow: var(--shadow);
    }

    .hero::before {
      content: "";
      position: absolute;
      left: -90px;
      top: -120px;
      width: 270px;
      height: 270px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -110px;
      bottom: -165px;
      width: 420px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.065);
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .hero-copy {
      max-width: 720px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.065em;
      text-transform: uppercase;
    }

    .hero h2 {
      max-width: 720px;
      margin: 21px 0 16px;
      font-size: clamp(2.25rem, 4.4vw, 3.75rem);
      line-height: 1.06;
      letter-spacing: -0.04em;
    }

    .hero p {
      max-width: 700px;
      margin: 0;
      color: rgba(255, 255, 255, 0.84);
      font-size: clamp(0.96rem, 1.5vw, 1.05rem);
      line-height: 1.72;
    }

    .hero-stats {
      display: grid;
      gap: 13px;
    }

    .hero-stat {
      position: relative;
      overflow: hidden;
      padding: 18px 19px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.105);
      backdrop-filter: blur(6px);
    }

    .hero-stat::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.72), transparent);
      opacity: 0.55;
    }

    .hero-stat strong {
      display: block;
      font-size: 1.1rem;
      line-height: 1.25;
    }

    .hero-stat span {
      display: block;
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.76);
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .section {
      margin-top: 24px;
    }

    .section h3 {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    .section > p {
      margin: 6px 0 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      padding: clamp(19px, 3vw, 28px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: 0 12px 34px rgba(24, 58, 49, 0.08);
    }

    .step {
      display: inline-grid;
      place-items: center;
      min-width: 34px;
      height: 34px;
      margin-bottom: 12px;
      padding: 0 9px;
      border-radius: 10px;
      color: var(--dark);
      background: var(--mint);
      font-weight: 900;
    }

    .card h4 {
      margin: 0 0 7px;
      font-size: 1.12rem;
    }

    .copy {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.92rem;
    }

    .emergency-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .choice {
      min-height: 98px;
      padding: 14px 10px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #ffffff;
      color: var(--ink);
      transition: 0.18s;
    }

    .choice:hover {
      transform: translateY(-2px);
      border-color: var(--green);
    }

    .choice.selected {
      border-color: var(--green);
      background: #ecfaf6;
      box-shadow: inset 0 0 0 2px rgba(11, 141, 121, 0.12);
    }

    .choice span {
      display: block;
      margin-bottom: 7px;
      font-size: 1.5rem;
    }

    .choice strong {
      font-size: 0.82rem;
    }

    .priority-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .priority {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      text-align: left;
    }

    .priority.selected {
      border-color: var(--red);
      background: #fff1f1;
    }

    .priority strong {
      display: block;
    }

    .priority small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      line-height: 1.35;
    }

    .location-box {
      padding: 16px;
      border: 1px dashed #deb875;
      border-radius: 16px;
      background: #fffaf1;
    }

    .location-status {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
    }

    .location-icon {
      display: grid;
      place-items: center;
      flex: 0 0 40px;
      height: 40px;
      border-radius: 12px;
      background: #f7ecd8;
    }

    .location-status strong {
      display: block;
    }

    .location-status small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      word-break: break-word;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .btn {
      min-height: 45px;
      padding: 0 16px;
      border: 0;
      border-radius: 13px;
      font-weight: 900;
    }

    .primary {
      color: #ffffff;
      background: var(--green);
    }

    .secondary {
      color: var(--dark);
      background: var(--mint);
    }

    .danger {
      color: #ffffff;
      background: var(--red);
    }

    .success {
      color: #ffffff;
      background: var(--success);
    }

    .amber {
      color: #ffffff;
      background: var(--amber);
    }

    .outline {
      color: var(--dark);
      background: #ffffff;
      border: 1px solid var(--line);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 0.82rem;
      font-weight: 850;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcfc;
      outline: none;
    }

    .field textarea {
      min-height: 88px;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(11, 141, 121, 0.1);
    }

    .toggle-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcfc;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .toggle input {
      width: 17px;
      height: 17px;
      accent-color: var(--green);
    }

    .privacy {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.5;
    }

    .map-stage {
      position: relative;
      width: 100%;
      height: 360px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        radial-gradient(circle at 18% 24%, rgba(10, 118, 103, 0.1) 0 5px, transparent 6px),
        radial-gradient(circle at 76% 68%, rgba(10, 118, 103, 0.08) 0 7px, transparent 8px),
        linear-gradient(23deg, transparent 49%, rgba(255, 255, 255, 0.65) 50%, transparent 51%),
        repeating-linear-gradient(0deg, transparent 0 36px, rgba(7, 63, 55, 0.055) 37px 38px),
        repeating-linear-gradient(90deg, transparent 0 48px, rgba(7, 63, 55, 0.05) 49px 50px),
        linear-gradient(135deg, #f7ead1, #f5f9f6 52%, #dff5ef);
    }

    .map-stage::before {
      content: "";
      position: absolute;
      left: -8%;
      top: 48%;
      width: 116%;
      height: 18px;
      background: rgba(255, 255, 255, 0.88);
      transform: rotate(-10deg);
      box-shadow: 0 0 0 1px rgba(7, 63, 55, 0.06);
    }

    .map-stage::after {
      content: "";
      position: absolute;
      left: 36%;
      top: -10%;
      width: 16px;
      height: 120%;
      background: rgba(255, 255, 255, 0.72);
      transform: rotate(14deg);
      box-shadow: 0 0 0 1px rgba(7, 63, 55, 0.05);
    }

    .map-label {
      position: absolute;
      z-index: 4;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--dark);
      font-size: 0.72rem;
      font-weight: 850;
      box-shadow: 0 5px 16px rgba(18, 58, 49, 0.1);
    }

    .map-label.one {
      left: 8%;
      top: 10%;
    }

    .map-label.two {
      right: 8%;
      bottom: 9%;
    }

    .route-svg {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .route-primary {
      stroke: var(--green2);
      stroke-width: 4;
      stroke-dasharray: 9 7;
      stroke-linecap: round;
    }

    .route-backup {
      stroke: var(--amber);
      stroke-width: 3;
      stroke-dasharray: 4 7;
      stroke-linecap: round;
    }

    .map-marker {
      position: absolute;
      z-index: 5;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 4px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 8px 18px rgba(18, 58, 49, 0.18);
      font-size: 0.8rem;
      font-weight: 900;
    }

    .map-marker.responder {
      background: var(--green);
      color: #ffffff;
    }

    .map-marker.specialist {
      background: var(--amber);
      color: #ffffff;
    }

    .map-marker.user {
      display: none;
      background: var(--red);
      color: #ffffff;
    }

    .map-marker.user.show {
      display: grid;
    }

    .marker-name {
      position: absolute;
      z-index: 6;
      transform: translate(-50%, 10px);
      padding: 4px 7px;
      border-radius: 7px;
      background: #ffffff;
      color: var(--dark);
      font-size: 0.68rem;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(18, 58, 49, 0.12);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-right: 6px;
      border-radius: 50%;
    }

    .dot.red {
      background: var(--red);
    }

    .dot.green {
      background: var(--green);
    }

    .dot.amber {
      background: var(--amber);
    }

    .result {
      display: none;
      margin-top: 20px;
      overflow: hidden;
      border: 1px solid rgba(22, 133, 84, 0.25);
      border-radius: 24px;
      background: #eefaf3;
    }

    .result.show {
      display: block;
    }

    .result-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      color: #ffffff;
      background: var(--success);
    }

    .result-head strong {
      display: block;
    }

    .result-head small {
      display: block;
      margin-top: 4px;
      color: rgba(255, 255, 255, 0.82);
    }

    .pill {
      align-self: flex-start;
      padding: 7px 10px;
      border-radius: 999px;
      color: var(--success);
      background: #ffffff;
      font-size: 0.74rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .result-body {
      padding: 20px;
    }

    .countdown {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding: 14px 15px;
      border: 1px solid rgba(198, 122, 20, 0.25);
      border-radius: 15px;
      background: var(--amber-bg);
    }

    .countdown strong {
      display: block;
      color: #8b5208;
    }

    .countdown span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .relay-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .relay-card {
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: #ffffff;
    }

    .relay-card.primary-card {
      border-color: rgba(10, 118, 103, 0.3);
    }

    .relay-card.backup-card {
      border-color: rgba(198, 122, 20, 0.35);
    }

    .relay-label {
      display: inline-block;
      margin-bottom: 10px;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--mint);
      color: var(--dark);
      font-size: 0.7rem;
      font-weight: 900;
    }

    .backup-card .relay-label {
      background: var(--amber-bg);
      color: #8b5208;
    }

    .relay-card h4 {
      margin: 0;
    }

    .relay-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .relay-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .mini {
      padding: 10px;
      border-radius: 11px;
      background: #f7f9f8;
    }

    .mini span {
      display: block;
      color: var(--muted);
      font-size: 0.68rem;
    }

    .mini strong {
      display: block;
      margin-top: 4px;
      font-size: 0.85rem;
    }

    .explain {
      margin-top: 14px;
      padding: 15px;
      border: 1px solid rgba(43, 108, 176, 0.18);
      border-radius: 15px;
      background: #f1f7fd;
    }

    .explain strong {
      display: block;
      color: #1f4f82;
    }

    .explain ul,
    .guidance ul {
      margin: 9px 0 0;
      padding-left: 19px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .guidance {
      margin-top: 14px;
      padding: 15px;
      border: 1px solid rgba(207, 64, 64, 0.18);
      border-radius: 15px;
      background: #fff5f5;
    }

    .guidance strong {
      display: block;
      color: #9a2929;
    }

    .timeline {
      display: grid;
      gap: 11px;
      margin: 18px 0 0;
      padding: 0;
      list-style: none;
    }

    .timeline li {
      display: flex;
      gap: 10px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .check {
      display: grid;
      place-items: center;
      flex: 0 0 24px;
      height: 24px;
      border-radius: 50%;
      color: #ffffff;
      background: var(--success);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .check.pending {
      color: #b86a00;
      background: #fff7e5;
    }

    .check.grey {
      color: #60706b;
      background: #eef2f0;
    }

    .proofs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .proof {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
    }

    .proof b {
      display: block;
      margin: 8px 0;
    }

    .proof p {
      margin: 0;
      color: var(--muted);
      font-size: 0.83rem;
      line-height: 1.55;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 0.72fr 1.28fr;
      gap: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      padding: 16px;
      border-radius: 15px;
      background: #ecfaf6;
    }

    .stat strong {
      display: block;
      color: var(--dark);
      font-size: 1.3rem;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .empty {
      padding: 36px 18px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      text-align: center;
      color: var(--muted);
      background: #fbfcfc;
    }

    .request-card {
      display: none;
      overflow: hidden;
      border: 1px solid rgba(207, 69, 69, 0.2);
      border-radius: 18px;
    }

    .request-card.show {
      display: block;
    }

    .request-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 17px;
      color: var(--red);
      background: #fff0f0;
    }

    .request-body {
      padding: 17px;
    }

    .request-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .detail {
      padding: 11px;
      border-radius: 12px;
      background: #f7f9f8;
    }

    .detail span {
      display: block;
      color: var(--muted);
      font-size: 0.69rem;
      font-weight: 750;
    }

    .detail strong {
      display: block;
      margin-top: 4px;
      font-size: 0.84rem;
      word-break: break-word;
    }

    .access-summary {
      margin-bottom: 15px;
      padding: 14px;
      border: 1px solid #eed8ae;
      border-radius: 14px;
      background: #fffaf1;
    }

    .access-summary strong {
      display: block;
    }

    .access-summary p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.78rem;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      max-width: min(390px, calc(100% - 36px));
      padding: 14px 16px;
      border-radius: 14px;
      color: #ffffff;
      background: var(--dark);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      transition: 0.22s;
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .toast.show {
      opacity: 1;
      transform: none;
    }

    [dir="rtl"] .toast {
      right: auto;
      left: 18px;
    }

    [dir="rtl"] .priority {
      text-align: right;
    }

    @media (max-width: 940px) {
      .hero,
      .grid,
      .dashboard {
        grid-template-columns: 1fr;
      }

      .hero-stats {
        grid-template-columns: repeat(3, 1fr);
      }

      .proofs {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 680px) {
      .app {
        width: calc(100% - 18px);
      }

      header {
        align-items: flex-start;
        gap: 12px;
      }

      .logo {
        flex-basis: 50px;
        width: 50px;
        height: 50px;
        border-radius: 15px;
      }

      .brand h1 {
        font-size: 1.32rem;
      }

      .brand p {
        display: none;
      }

      .hero {
        padding: 26px 20px;
        border-radius: 23px;
      }

      .hero-stats,
      .emergency-grid,
      .priority-grid,
      .relay-grid,
      .proofs {
        grid-template-columns: 1fr 1fr;
      }

      .form,
      .request-details,
      .toggle-grid {
        grid-template-columns: 1fr;
      }

      .field.full {
        grid-column: auto;
      }

      .map-stage {
        height: 315px;
      }

      .countdown {
        align-items: flex-start;
        flex-direction: column;
      }

      footer {
        flex-direction: column;
      }
    }

    @media (max-width: 440px) {
      .hero-stats,
      .emergency-grid,
      .priority-grid,
      .relay-grid,
      .proofs,
      .stats,
      .relay-metrics {
        grid-template-columns: 1fr;
      }

      .nav button {
        padding: 0 10px;
        font-size: 0.78rem;
      }
    }
  </style>

</head>

    const rad = value => value * Math.PI / 180;

    function distance(lat1, lng1, lat2, lng2) {
      const earthRadius = 6371;
      const dLat = rad(lat2 - lat1);
      const dLng = rad(lng2 - lng1);

      const calculation =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(rad(lat1)) *
        Math.cos(rad(lat2)) *
        Math.sin(dLng / 2) ** 2;

      return earthRadius *
        2 *
        Math.atan2(
          Math.sqrt(calculation),
          Math.sqrt(1 - calculation)
        );
    }

    function mapPosition(lat, lng) {
      return {
        x: Math.max(
          7,
          Math.min(
            93,
            50 + (lng - DEMO_CENTER.lng) * 1200
          )
        ),
        y: Math.max(
          7,
          Math.min(
            93,
            50 - (lat - DEMO_CENTER.lat) * 1200
          )
        )
      };
    }

    function scoreResponder(responder, kind) {
      let score = 100;

      if (!responder.types.includes(selectedEmergency)) {
        return -9999;
      }

      const kilometres = distance(
        residentLocation.lat,
        residentLocation.lng,
        responder.lat,
        responder.lng
      );

      score -= kilometres * 4;

      if (
        kind === "primary" &&
        responder.kind === "community"
      ) {
        score += 25;
      }

      if (
        kind === "backup" &&
        responder.kind === "specialist"
      ) {
        score += 35;
      }

      if (el.needs4x4.checked) {
        score += responder.fourByFour
          ? 28
          : -120;
      }

      if (
        selectedPriority === "Critical" &&
        responder.kind === "specialist"
      ) {
        score += 8;
      }

      return score;
    }

    function matchRelay() {
      const primary = responders
        .filter(responder => responder.kind === "community")
        .map(responder => ({
          ...responder,
          distanceKm: distance(
            residentLocation.lat,
            residentLocation.lng,
            responder.lat,
            responder.lng
          ),
          score: scoreResponder(
            responder,
            "primary"
          )
        }))
        .sort(
          (first, second) =>
            second.score - first.score
        )[0];

      let backup = responders
        .filter(responder => responder.kind === "specialist")
        .map(responder => ({
          ...responder,
          distanceKm: distance(
            residentLocation.lat,
            residentLocation.lng,
            responder.lat,
            responder.lng
          ),
          score: scoreResponder(
            responder,
            "backup"
          )
        }))
        .sort(
          (first, second) =>
            second.score - first.score
        )[0];

      if (!backup || backup.score < -500) {
        backup = responders
          .filter(
            responder =>
              responder.id !== primary.id &&
              responder.types.includes(selectedEmergency)
          )
          .map(responder => ({
            ...responder,
            distanceKm: distance(
              residentLocation.lat,
              residentLocation.lng,
              responder.lat,
              responder.lng
            ),
            score: scoreResponder(
              responder,
              "backup"
            )
          }))
          .sort(
            (first, second) =>
              second.score - first.score
          )[0];
      }

      return {
        primary,
        backup
      };
    }

    function eta(kilometres, responder) {
      const speed =
        responder.fourByFour
          ? 45
          : 32;

      return Math.max(
        4,
        Math.round(
          kilometres / speed * 60 + 3
        )
      );
    }

          : `المعدات: ${responder.equipmentAr.slice(0, 2).join("، ")}`
      );

      return reasons;
    }

        currentRequest.primary.lat,
        currentRequest.primary.lng

      const backup = mapPosition(
        currentRequest.backup.lat,
        currentRequest.backup.lng

      [
        [el.primaryRoute, primary],
        [el.backupRoute, backup]
      ].forEach(([line, target]) => {
        line.setAttribute("x1", user.x);
        line.setAttribute("y1", user.y);
        line.setAttribute("x2", target.x);
        line.setAttribute("y2", target.y);
        line.style.display = "block";
      });
    }

    function createRequest() {
      if (!selectedEmergency) {
        showToast(tr("selectEmergency"));

      if (!selectedPriority) {
        showToast(tr("selectPriority"));
        return;
      }

      if (!residentLocation) {
        showToast(tr("shareLocation"));
        return;
      }

      const relay = matchRelay();

      currentRequest = {
        id: "DR-" + Date.now().toString().slice(-6),
        emergencyType: selectedEmergency,
        priority: selectedPriority,
        residentName:
          el.residentName.value.trim() ||
          tr("noName"),

          el.residentPhone.value.trim(),
        notes:
          el.residentNotes.value.trim() ||
          tr("noNotes"),

          landmark:

          gateNumber:

          needs4x4:

          gateLocked:
            el.gateLocked.checked,
          animalsNearby:
            el.animalsNearby.checked,
          hazardNearby:
            el.hazardNearby.checked
        },
        primary: {
          ...relay.primary,
          etaMinutes: eta(
            relay.primary.distanceKm,
            relay.primary
          )
        },
        backup: {
          ...relay.backup,
          etaMinutes: eta(
            relay.backup.distanceKm,
            relay.backup
          )
        },
        activeLevel: "primary",
        status: "waiting",
        createdAt: new Date().toISOString(),
        countdownRemaining:
          selectedPriority === "Critical"
            ? 25
            : selectedPriority === "Urgent"
              ? 40
              : 60
      };

      countdownRemaining =
        currentRequest.countdownRemaining;

      save();
      drawRoutes();
      renderRequest();
      startCountdown();

      el.resultPanel.classList.add("show");

      el.resultPanel.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });

      showToast(tr("requestCreated"));
    }

    function activeResponder() {
      return currentRequest.activeLevel === "backup"
        ? currentRequest.backup
        : currentRequest.primary;
    }

    function statusText() {
      if (currentRequest.status === "waiting") {
        return tr("waiting");
      }

      if (currentRequest.status === "backup_alerted") {
        return tr("backupAlerted");
      }

      if (currentRequest.status === "accepted") {
        return tr("accepted");
      }

      if (currentRequest.status === "on_way") {
        return tr("onWay");
      }

      return tr("arrived");
    }

    function timelineItems() {
      return [
        {
          done: true,
          en: "Request, priority and rural access details received.",
          ar: "تم استلام الطلب والأولوية وتفاصيل الوصول الريفي."
        },
        {
          done: true,
          en: "Nearby suitable community responder matched.",
          ar: "تمت مطابقة مستجيب مجتمعي قريب ومناسب."
        },
        {
          done:
            currentRequest.activeLevel === "backup" ||
            ["accepted", "on_way", "arrived"].includes(currentRequest.status),
          pending:
            currentRequest.status === "waiting",
          en:
            currentRequest.activeLevel === "backup"
              ? "Specialist backup alerted."
              : "Waiting for primary responder acceptance.",
          ar:
            currentRequest.activeLevel === "backup"
              ? "تم تنبيه الدعم المتخصص."
              : "بانتظار قبول المستجيب القريب."
        },
        {
          done:
            ["accepted", "on_way", "arrived"].includes(currentRequest.status),
          pending:
            !["accepted", "on_way", "arrived"].includes(currentRequest.status),
          en: "Responder accepted the request.",
          ar: "وافق المستجيب على الطلب."
        },
        {
          done:
            ["on_way", "arrived"].includes(currentRequest.status),
          pending:
            currentRequest.status === "accepted",
          en: "Responder is on the way.",
          ar: "المستجيب في الطريق."
        },
        {
          done:
            currentRequest.status === "arrived",
          pending:
            currentRequest.status === "on_way",
          en: "Responder arrived at the location.",
          ar: "وصل المستجيب إلى الموقع."
        }
      ];
    }

    function renderRequest() {
      if (!currentRequest) {
        return;
      }

      const primary = currentRequest.primary;
      const backup = currentRequest.backup;
      const active = activeResponder();

      const primaryRole =
        language === "ar"
          ? primary.roleAr
          : primary.roleEn;

      const backupRole =
        language === "ar"
          ? backup.roleAr
          : backup.roleEn;

      el.resultPanel.classList.add("show");

      el.resultRequestId.textContent =
        tr("requestId") +
        ": " +
        currentRequest.id;

      el.residentStatusPill.textContent =
        statusText();

      el.countdownTitle.textContent =
        tr("countdownTitle") +
        ": " +
        Math.max(0, countdownRemaining) +
        "s";

      el.countdownCopy.textContent =
        currentRequest.activeLevel === "backup"
          ? (
            language === "en"
              ? "The specialist backup is now the active responder."
              : "أصبح الدعم المتخصص هو المستجيب النشط."
          )
          : tr("countdownCopy");

      el.triggerBackupButton.disabled =
        currentRequest.activeLevel === "backup" ||
        ["accepted", "on_way", "arrived"].includes(currentRequest.status);

      el.primaryName.textContent =
        primary.name;

      el.primaryRole.textContent =
        primaryRole;

      el.primaryDistance.textContent =
        primary.distanceKm.toFixed(2) +
        " km";

      el.primaryEta.textContent =
        primary.etaMinutes +
        " " +
        tr("minutes");

      el.backupName.textContent =
        backup.name;

      el.backupRole.textContent =
        backupRole;

      el.backupDistance.textContent =
        backup.distanceKm.toFixed(2) +
        " km";

      el.backupEta.textContent =
        backup.etaMinutes +
        " " +
        tr("minutes");

      el.matchReasons.innerHTML =
        reasonsFor(active)
          .map(reason => "<li>" + reason + "</li>")
          .join("");

      el.safetyGuidance.innerHTML =
        guidance[currentRequest.emergencyType][language]
          .map(item => "<li>" + item + "</li>")
          .join("");

      el.residentTimeline.innerHTML =
        timelineItems()
          .map(item => {
            const stateClass =
              item.done
                ? ""
                : item.pending
                  ? "pending"
                  : "grey";

            const icon =
              item.done
                ? "✓"
                : item.pending
                  ? "…"
                  : "○";

            const text =
              language === "en"
                ? item.en
                : item.ar;

            return `
              <li>
                <span class="check ${stateClass}">${icon}</span>
                <span>${text}</span>
              </li>
            `;
          })
          .join("");

      el.requestEmpty.style.display =
        "none";

      el.requestCard.classList.add("show");

      el.dashboardOpenRequests.textContent =
        currentRequest.status === "arrived"
          ? "0"
          : "1";

      el.dashboardActiveResponder.textContent =
        active.name;

      el.dashboardPriority.textContent =
        priorityNames[currentRequest.priority][language];

      el.dashboardEmergencyType.textContent =
        emergencyNames[currentRequest.emergencyType][language];

      el.dashboardRequestTime.textContent =
        new Date(
          currentRequest.createdAt
        ).toLocaleTimeString(
          language === "ar"
            ? "ar-AE"
            : "en-AE",
          {
            hour: "2-digit",
            minute: "2-digit"
          }
        );

      el.dashboardRequestId.textContent =
        currentRequest.id;

      el.dashboardResidentName.textContent =
        currentRequest.residentName;

      el.dashboardCoordinates.textContent =
        currentRequest.location.lat.toFixed(5) +
        ", " +
        currentRequest.location.lng.toFixed(5);

      el.dashboardPriorityDetail.textContent =
        priorityNames[currentRequest.priority][language];

      el.dashboardResponder.textContent =
        active.name +
        " · " +
        (
          language === "ar"
            ? active.roleAr
            : active.roleEn
        );

      el.dashboardNotes.textContent =
        currentRequest.notes;

      el.dashboardAccess.textContent =
        accessText();

      el.dashboardReasons.innerHTML =
        reasonsFor(active)
          .map(reason => "<li>" + reason + "</li>")
          .join("");

      const accepted =
        ["accepted", "on_way", "arrived"].includes(currentRequest.status);

      el.acceptRequestButton.disabled =
        accepted;

      el.onWayButton.disabled =
        !accepted ||
        ["on_way", "arrived"].includes(currentRequest.status);

      el.arrivedButton.disabled =
        currentRequest.status !== "on_way";

      el.declineButton.disabled =
        currentRequest.activeLevel === "backup" ||
        accepted;

      drawRoutes();
    }

    function save() {
      localStorage.setItem(
        "desertReachRelay",
        JSON.stringify(currentRequest)
      );
    }

    function startCountdown() {
      clearInterval(countdownTimer);

      if (
        !currentRequest ||
        currentRequest.activeLevel === "backup" ||
        ["accepted", "on_way", "arrived"].includes(currentRequest.status)
      ) {
        return;
      }

      countdownTimer = setInterval(() => {
        countdownRemaining--;
        currentRequest.countdownRemaining =
          countdownRemaining;

        el.countdownTitle.textContent =
          tr("countdownTitle") +
          ": " +
          Math.max(0, countdownRemaining) +
          "s";

        if (countdownRemaining <= 0) {
          triggerBackup();
        }
      }, 1000);
    }

    function triggerBackup() {
      if (
        !currentRequest ||
        currentRequest.activeLevel === "backup"
      ) {
        return;
      }

      clearInterval(countdownTimer);

      currentRequest.activeLevel =
        "backup";

      currentRequest.status =
        "backup_alerted";

      currentRequest.countdownRemaining =
        0;

      countdownRemaining = 0;

      save();
      renderRequest();
      showToast(tr("backupTriggered"));
    }

    function acceptRequest() {
      if (!currentRequest) {
        return;
      }

      clearInterval(countdownTimer);

      currentRequest.status =
        "accepted";

      save();
      renderRequest();
      showToast(tr("requestAccepted"));
    }

    function markOnWay() {
      if (
        !currentRequest ||
        currentRequest.status !== "accepted"
      ) {
        return;
      }

      currentRequest.status =
        "on_way";

      save();
      renderRequest();
      showToast(tr("statusOnWay"));
    }

    function markArrived() {
      if (
        !currentRequest ||
        currentRequest.status !== "on_way"
      ) {
        return;
      }

      currentRequest.status =
        "arrived";

      save();
      renderRequest();
      showToast(tr("statusArrived"));
    }

    function fallback() {
      if (!currentRequest) {
        return "";
      }

      const active =
        activeResponder();

      const hazards = [
        currentRequest.access.animalsNearby
          ? "animals nearby"
          : "",
        currentRequest.access.hazardNearby
          ? "machinery or fire hazard"
          : ""
      ]
        .filter(Boolean)
        .join(", ");

      return [
        "DESERTREACH RESCUE PACKET",
        "Request: " + currentRequest.id,
        "Emergency: " + currentRequest.emergencyType,
        "Priority: " + currentRequest.priority,
        "Location: " +
          currentRequest.location.lat.toFixed(5) +
          ", " +
          currentRequest.location.lng.toFixed(5),
        "Map: https://www.openstreetmap.org/?mlat=" +
          currentRequest.location.lat +
          "&mlon=" +
          currentRequest.location.lng,
        "Resident: " + currentRequest.residentName,
        "Landmark: " +
          (
            currentRequest.access.landmark ||
            "Not provided"
          ),
        "Gate/Farm: " +
          (
            currentRequest.access.gateNumber ||
            "Not provided"
          ),
        "Visual description: " +
          (
            currentRequest.access.visualDescription ||
            "Not provided"
          ),
        "4x4 required: " +
          (
            currentRequest.access.needs4x4
              ? "Yes"
              : "No"
          ),
        "Gate may be locked: " +
          (
            currentRequest.access.gateLocked
              ? "Yes"
              : "No"
          ),
        "Hazards: " +
          (
            hazards ||
            "None reported"
          ),
        "Active responder: " +
          active.name,
        "Note: " +
          currentRequest.notes,
        "Prototype only — contact official emergency services in a real emergency."
      ].join("\n");
    }

    async function copyFallback() {
      const message = fallback();

      if (!message) {
        return;
      }

      try {
        await navigator.clipboard.writeText(message);
        showToast(tr("copied"));
      } catch (error) {
        window.prompt(
          "Copy this rescue packet:",
          message
        );

        showToast(tr("copyError"));
      }
    }

    function resetDemo() {
      clearInterval(countdownTimer);

      localStorage.removeItem(
        "desertReachRelay"
      );

      location.reload();
    }

    function restore() {
      const saved =
        localStorage.getItem(
          "desertReachRelay"
        );

      if (!saved) {
        return;
      }

      try {
        currentRequest =
          JSON.parse(saved);

        selectedEmergency =
          currentRequest.emergencyType;

        selectedPriority =
          currentRequest.priority;

        residentLocation =
          currentRequest.location;

        countdownRemaining =
          currentRequest.countdownRemaining ?? 0;

        el.emergency.forEach(button => {
          button.classList.toggle(
            "selected",
            button.dataset.type === selectedEmergency
          );
        });

        el.priority.forEach(button => {
          button.classList.toggle(
            "selected",
            button.dataset.priority === selectedPriority
          );
        });

        setLocation(
          residentLocation.lat,
          residentLocation.lng,
          residentLocation.isDemo
        );

        el.landmark.value =
          currentRequest.access.landmark || "";

        el.gateNumber.value =
          currentRequest.access.gateNumber || "";

        el.visualDescription.value =
          currentRequest.access.visualDescription || "";

        el.needs4x4.checked =
          Boolean(currentRequest.access.needs4x4);

        el.gateLocked.checked =
          Boolean(currentRequest.access.gateLocked);

        el.animalsNearby.checked =
          Boolean(currentRequest.access.animalsNearby);

        el.hazardNearby.checked =
          Boolean(currentRequest.access.hazardNearby);

        renderRequest();
        startCountdown();
      } catch (error) {
        localStorage.removeItem(
          "desertReachRelay"
        );
      }
    }

    el.emergency.forEach(button => {
      button.addEventListener("click", () => {
        selectedEmergency =
          button.dataset.type;

        el.emergency.forEach(item => {
          item.classList.toggle(
            "selected",
            item === button
          );
        });

        updateSubmit();
      });
    });

    el.priority.forEach(button => {
      button.addEventListener("click", () => {
        selectedPriority =
          button.dataset.priority;

        el.priority.forEach(item => {
          item.classList.toggle(
            "selected",
            item === button
          );
        });

        updateSubmit();
      });
    });

    el.useLocationButton.addEventListener("click", () => {
      if (!navigator.geolocation) {
        showToast(tr("locationError"));
        return;
      }

      showToast(tr("locating"));

      navigator.geolocation.getCurrentPosition(
        position => {
          setLocation(
            position.coords.latitude,
            position.coords.longitude,
            false
          );

          showToast(tr("locationSuccess"));
        },
        () => {
          showToast(tr("locationError"));
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    });

    el.demoLocationButton.addEventListener("click", () => {
      setLocation(
        DEMO_CENTER.lat,
        DEMO_CENTER.lng,
        true
      );

      showToast(tr("demoSuccess"));
    });

    el.requestHelpButton.addEventListener(
      "click",
      createRequest
    );

    el.triggerBackupButton.addEventListener(
      "click",
      triggerBackup
    );

    el.openResponderButton.addEventListener(
      "click",
      () => switchView("responder")
    );

    el.copyFallbackButton.addEventListener(
      "click",
      copyFallback
    );

    el.acceptRequestButton.addEventListener(
      "click",
      acceptRequest
    );

    el.onWayButton.addEventListener(
      "click",
      markOnWay
    );

    el.arrivedButton.addEventListener(
      "click",
      markArrived
    );

    el.declineButton.addEventListener(
      "click",
      triggerBackup
    );

    el.backToResidentButton.addEventListener(
      "click",
      () => switchView("resident")
    );

    el.residentTab.addEventListener(
      "click",
      () => switchView("resident")
    );

    el.responderTab.addEventListener(
      "click",
      () => switchView("responder")
    );

    el.languageButton.addEventListener(
      "click",
      () => {
        language =
          language === "en"
            ? "ar"
            : "en";

        applyLanguage();
      }
    );

    el.resetButton.addEventListener(
      "click",
      resetDemo
    );

    initMap();
    applyLanguage();
    restore();
  </script>

</body>
</html>
