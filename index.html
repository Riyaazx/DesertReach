<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DesertReach Rescue Relay coordinates the nearest suitable community responder and specialist backup for rural emergencies.">
  <title>DesertReach Rescue Relay | Tatweer Challenge 2</title>
  <style>
    :root{
      --green:#0a7667;--green2:#0d8f7b;--dark:#063f37;--mint:#dff5ef;--bg:#f5faf7;
      --ink:#16211f;--muted:#66736f;--line:#dfe8e4;--red:#cf4040;--success:#17894f;
      --amber:#c67a14;--amber-bg:#fff6e8;--blue:#2b6cb0;--sand:#f3e4c6;--white:#fff;
      --shadow:0 18px 48px rgba(18,58,49,.12);--radius:24px
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;color:var(--ink);background:linear-gradient(180deg,#fffdf8,var(--bg));font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}
    button,input,textarea{font:inherit}button{cursor:pointer}
    .notice{padding:9px 16px;text-align:center;color:#fff;background:var(--dark);font-size:.82rem;font-weight:800}
    .app{width:min(1180px,calc(100% - 28px));margin:auto;padding-bottom:46px}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 0 17px}
    .brand{display:flex;align-items:center;gap:12px}.logo{display:grid;place-items:center;width:50px;height:50px;border-radius:16px;color:#fff;background:linear-gradient(145deg,var(--green2),var(--dark));font-size:1.35rem;box-shadow:0 10px 24px rgba(10,118,103,.22)}
    .brand h1{margin:0;font-size:1.55rem;line-height:1}.brand p{margin:6px 0 0;color:var(--muted);font-size:.82rem;font-weight:650}
    .nav{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px}.nav button{min-height:42px;padding:0 14px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--dark);font-weight:850}.nav button.active{color:#fff;background:var(--green);border-color:var(--green)}
    .view{display:none}.view.active{display:block}
    .hero{display:grid;grid-template-columns:1.35fr .65fr;gap:28px;align-items:center;padding:clamp(28px,5vw,54px);border-radius:30px;color:#fff;background:linear-gradient(110deg,var(--dark),var(--green2));box-shadow:var(--shadow);overflow:hidden;position:relative}
    .hero:after{content:"";position:absolute;right:-110px;bottom:-165px;width:420px;height:320px;border-radius:50%;background:rgba(255,255,255,.07)}
    .hero>*{position:relative;z-index:1}.eyebrow{display:inline-block;padding:8px 12px;border:1px solid rgba(255,255,255,.28);border-radius:999px;background:rgba(255,255,255,.1);font-size:.78rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase}.hero h2{margin:18px 0 12px;font-size:clamp(2rem,5vw,4rem);line-height:1.03;letter-spacing:-.035em}.hero p{margin:0;color:rgba(255,255,255,.84);line-height:1.7}
    .hero-stats{display:grid;gap:12px}.hero-stat{padding:18px;border:1px solid rgba(255,255,255,.2);border-radius:18px;background:rgba(255,255,255,.11);backdrop-filter:blur(4px)}.hero-stat strong{display:block;font-size:1.35rem}.hero-stat span{display:block;margin-top:5px;color:rgba(255,255,255,.76);font-size:.82rem}
    .section{margin-top:24px}.section h3{margin:0;font-size:clamp(1.4rem,3vw,2rem)}.section>p{margin:6px 0 14px;color:var(--muted);line-height:1.55}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.card{padding:clamp(19px,3vw,28px);border:1px solid var(--line);border-radius:var(--radius);background:#fff;box-shadow:0 12px 34px rgba(24,58,49,.08)}
    .step{display:inline-grid;place-items:center;min-width:34px;height:34px;margin-bottom:12px;padding:0 9px;border-radius:10px;color:var(--dark);background:var(--mint);font-weight:900}.card h4{margin:0 0 7px;font-size:1.12rem}.copy{margin:0 0 18px;color:var(--muted);line-height:1.55;font-size:.92rem}
    .emergency-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.choice{min-height:98px;padding:14px 10px;border:1px solid var(--line);border-radius:15px;background:#fff;color:var(--ink);transition:.18s}.choice:hover{transform:translateY(-2px);border-color:var(--green)}.choice.selected{border-color:var(--green);background:#ecfaf6;box-shadow:inset 0 0 0 2px rgba(11,141,121,.12)}.choice span{display:block;margin-bottom:7px;font-size:1.5rem}.choice strong{font-size:.82rem}
    .priority-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}.priority{padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff;text-align:left}.priority.selected{border-color:var(--red);background:#fff1f1}.priority strong{display:block}.priority small{display:block;margin-top:4px;color:var(--muted);line-height:1.35}
    .location-box{padding:16px;border:1px dashed #deb875;border-radius:16px;background:#fffaf1}.location-status{display:flex;gap:12px;margin-bottom:14px}.location-icon{display:grid;place-items:center;flex:0 0 40px;height:40px;border-radius:12px;background:#f7ecd8}.location-status strong{display:block}.location-status small{display:block;margin-top:4px;color:var(--muted);word-break:break-word}
    .row{display:flex;flex-wrap:wrap;gap:9px}.btn{min-height:45px;padding:0 16px;border:0;border-radius:13px;font-weight:900}.primary{color:#fff;background:var(--green)}.secondary{color:var(--dark);background:var(--mint)}.danger{color:#fff;background:var(--red)}.success{color:#fff;background:var(--success)}.amber{color:#fff;background:var(--amber)}.outline{color:var(--dark);background:#fff;border:1px solid var(--line)}.btn:disabled{cursor:not-allowed;opacity:.5}
    .form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:grid;gap:7px}.field.full{grid-column:1/-1}.field label{font-size:.82rem;font-weight:850}.field input,.field textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#fbfcfc;outline:none}.field textarea{min-height:88px;resize:vertical}.field input:focus,.field textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(11,141,121,.1)}
    .toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.toggle{display:flex;align-items:center;gap:9px;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:#fbfcfc;font-size:.82rem;font-weight:700}.toggle input{accent-color:var(--green);width:17px;height:17px}
    .privacy{margin:10px 0 0;color:var(--muted);font-size:.76rem;line-height:1.5}
    .map-stage{position:relative;width:100%;height:360px;overflow:hidden;border:1px solid var(--line);border-radius:18px;background:radial-gradient(circle at 18% 24%,rgba(10,118,103,.10) 0 5px,transparent 6px),radial-gradient(circle at 76% 68%,rgba(10,118,103,.08) 0 7px,transparent 8px),linear-gradient(23deg,transparent 49%,rgba(255,255,255,.65) 50%,transparent 51%),repeating-linear-gradient(0deg,transparent 0 36px,rgba(7,63,55,.055) 37px 38px),repeating-linear-gradient(90deg,transparent 0 48px,rgba(7,63,55,.05) 49px 50px),linear-gradient(135deg,#f7ead1,#f5f9f6 52%,#dff5ef)}
    .map-stage:before{content:"";position:absolute;left:-8%;top:48%;width:116%;height:18px;background:rgba(255,255,255,.88);transform:rotate(-10deg);box-shadow:0 0 0 1px rgba(7,63,55,.06)}.map-stage:after{content:"";position:absolute;left:36%;top:-10%;width:16px;height:120%;background:rgba(255,255,255,.72);transform:rotate(14deg);box-shadow:0 0 0 1px rgba(7,63,55,.05)}
    .map-label{position:absolute;z-index:4;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.9);color:var(--dark);font-size:.72rem;font-weight:850;box-shadow:0 5px 16px rgba(18,58,49,.1)}.map-label.one{left:8%;top:10%}.map-label.two{right:8%;bottom:9%}
    .route-svg{position:absolute;inset:0;z-index:2;width:100%;height:100%;pointer-events:none}.route-primary{stroke:var(--green2);stroke-width:4;stroke-dasharray:9 7;stroke-linecap:round}.route-backup{stroke:var(--amber);stroke-width:3;stroke-dasharray:4 7;stroke-linecap:round}
    .map-marker{position:absolute;z-index:5;transform:translate(-50%,-50%);display:grid;place-items:center;width:34px;height:34px;border:4px solid #fff;border-radius:50%;box-shadow:0 8px 18px rgba(18,58,49,.18);font-size:.8rem;font-weight:900}.map-marker.responder{background:var(--green);color:#fff}.map-marker.specialist{background:var(--amber);color:#fff}.map-marker.user{display:none;background:var(--red);color:#fff}.map-marker.user.show{display:grid}.marker-name{position:absolute;z-index:6;transform:translate(-50%,10px);padding:4px 7px;border-radius:7px;background:#fff;color:var(--dark);font-size:.68rem;font-weight:800;white-space:nowrap;box-shadow:0 4px 12px rgba(18,58,49,.12)}
    .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;color:var(--muted);font-size:.78rem}.dot{display:inline-block;width:9px;height:9px;margin-right:6px;border-radius:50%}.dot.red{background:var(--red)}.dot.green{background:var(--green)}.dot.amber{background:var(--amber)}
    .result{display:none;margin-top:20px;border:1px solid rgba(22,133,84,.25);border-radius:24px;overflow:hidden;background:#eefaf3}.result.show{display:block}.result-head{display:flex;justify-content:space-between;gap:12px;padding:18px 20px;color:#fff;background:var(--success)}.result-head strong{display:block}.result-head small{display:block;margin-top:4px;color:rgba(255,255,255,.82)}.pill{align-self:flex-start;padding:7px 10px;border-radius:999px;color:var(--success);background:#fff;font-size:.74rem;font-weight:900;white-space:nowrap}.result-body{padding:20px}
    .countdown{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;padding:14px 15px;border:1px solid rgba(198,122,20,.25);border-radius:15px;background:var(--amber-bg)}.countdown strong{color:#8b5208}.countdown span{font-size:.82rem;color:var(--muted)}
    .relay-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.relay-card{padding:17px;border:1px solid var(--line);border-radius:17px;background:#fff}.relay-card.primary-card{border-color:rgba(10,118,103,.3)}.relay-card.backup-card{border-color:rgba(198,122,20,.35)}.relay-label{display:inline-block;margin-bottom:10px;padding:5px 8px;border-radius:999px;background:var(--mint);color:var(--dark);font-size:.7rem;font-weight:900}.backup-card .relay-label{background:var(--amber-bg);color:#8b5208}.relay-card h4{margin:0}.relay-card p{margin:6px 0 0;color:var(--muted);font-size:.82rem;line-height:1.5}.relay-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.mini{padding:10px;border-radius:11px;background:#f7f9f8}.mini span{display:block;color:var(--muted);font-size:.68rem}.mini strong{display:block;margin-top:4px;font-size:.85rem}
    .explain{margin-top:14px;padding:15px;border:1px solid rgba(43,108,176,.18);border-radius:15px;background:#f1f7fd}.explain strong{display:block;color:#1f4f82}.explain ul{margin:9px 0 0;padding-left:19px;color:var(--muted);font-size:.82rem;line-height:1.6}
    .guidance{margin-top:14px;padding:15px;border:1px solid rgba(207,64,64,.18);border-radius:15px;background:#fff5f5}.guidance strong{display:block;color:#9a2929}.guidance ul{margin:9px 0 0;padding-left:19px;color:var(--muted);font-size:.82rem;line-height:1.6}
    .timeline{display:grid;gap:11px;margin:18px 0 0;padding:0;list-style:none}.timeline li{display:flex;gap:10px;color:var(--muted);font-size:.85rem}.check{display:grid;place-items:center;flex:0 0 24px;height:24px;border-radius:50%;color:#fff;background:var(--success);font-size:.72rem;font-weight:900}.check.pending{color:#b86a00;background:#fff7e5}.check.grey{color:#60706b;background:#eef2f0}
    .proofs{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.proof{padding:20px;border:1px solid var(--line);border-radius:18px;background:#fff}.proof b{display:block;margin:8px 0}.proof p{margin:0;color:var(--muted);font-size:.83rem;line-height:1.55}
    .dashboard{display:grid;grid-template-columns:.72fr 1.28fr;gap:20px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{padding:16px;border-radius:15px;background:#ecfaf6}.stat strong{display:block;color:var(--dark);font-size:1.3rem}.stat span{display:block;margin-top:4px;color:var(--muted);font-size:.76rem}
    .empty{padding:36px 18px;border:1px dashed var(--line);border-radius:16px;text-align:center;color:var(--muted);background:#fbfcfc}.request-card{display:none;border:1px solid rgba(207,69,69,.2);border-radius:18px;overflow:hidden}.request-card.show{display:block}.request-head{display:flex;justify-content:space-between;gap:12px;padding:15px 17px;color:var(--red);background:#fff0f0}.request-body{padding:17px}.request-details{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px}.detail{padding:11px;border-radius:12px;background:#f7f9f8}.detail span{display:block;color:var(--muted);font-size:.69rem;font-weight:750}.detail strong{display:block;margin-top:4px;font-size:.84rem;word-break:break-word}.access-summary{margin-bottom:15px;padding:14px;border-radius:14px;background:#fffaf1;border:1px solid #eed8ae}.access-summary strong{display:block}.access-summary p{margin:6px 0 0;color:var(--muted);font-size:.82rem;line-height:1.5}
    footer{display:flex;justify-content:space-between;gap:20px;margin-top:32px;padding-top:24px;border-top:1px solid var(--line);color:var(--muted);font-size:.78rem}
    .toast{position:fixed;right:18px;bottom:18px;z-index:9999;max-width:min(390px,calc(100% - 36px));padding:14px 16px;border-radius:14px;color:#fff;background:var(--dark);box-shadow:var(--shadow);opacity:0;transform:translateY(14px);pointer-events:none;transition:.22s;font-size:.86rem;line-height:1.45}.toast.show{opacity:1;transform:none}[dir="rtl"] .toast{right:auto;left:18px}[dir="rtl"] .priority{text-align:right}
    @media(max-width:940px){.hero,.grid,.dashboard{grid-template-columns:1fr}.hero-stats{grid-template-columns:repeat(3,1fr)}.proofs{grid-template-columns:1fr 1fr}}
    @media(max-width:680px){.app{width:calc(100% - 18px)}header{align-items:flex-start}.brand p{display:none}.hero{padding:26px 20px;border-radius:23px}.hero-stats,.emergency-grid,.priority-grid,.relay-grid,.proofs{grid-template-columns:1fr 1fr}.form,.request-details,.toggle-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.map-stage{height:315px}.countdown{align-items:flex-start;flex-direction:column}footer{flex-direction:column}}
    @media(max-width:440px){.hero-stats,.emergency-grid,.priority-grid,.relay-grid,.proofs,.stats,.relay-metrics{grid-template-columns:1fr}.nav button{padding:0 10px;font-size:.78rem}}
  </style>
</head>
<body>
  <div class="notice" data-en="Hackathon prototype only — not an official emergency service. In a real emergency, contact the UAE's official emergency services." data-ar="نموذج أولي للهاكاثون فقط — وليس خدمة طوارئ رسمية. في حالة طوارئ حقيقية، تواصل مع خدمات الطوارئ الرسمية في دولة الإمارات."></div>
  <div class="app">
    <header>
      <div class="brand">
        <div class="logo">⌖</div>
        <div><h1>DesertReach</h1><p data-en="The Rural Rescue Relay" data-ar="سلسلة الإنقاذ الريفية"></p></div>
      </div>
      <div class="nav">
        <button id="residentTab" class="active" data-en="Resident" data-ar="المقيم"></button>
        <button id="responderTab" data-en="Responder" data-ar="المستجيب"></button>
        <button id="languageButton">العربية</button>
        <button id="resetButton" data-en="Reset demo" data-ar="إعادة التجربة"></button>
      </div>
    </header>

    <main>
      <section id="residentView" class="view active">
        <section class="hero">
          <div>
            <span class="eyebrow" data-en="Tatweer Challenge 2 · Al Qua'a" data-ar="تحدي تطوير 2 · القوع"></span>
            <h2 data-en="The nearest suitable helper now. The right specialist next." data-ar="أقرب مساعد مناسب الآن، والمتخصص الصحيح بعده."></h2>
            <p data-en="DesertReach builds a rescue relay for remote rural emergencies: a nearby trained community responder, a specialist backup, clear access information, and automatic escalation if nobody answers." data-ar="ينشئ DesertReach سلسلة إنقاذ للطوارئ الريفية البعيدة: مستجيب مجتمعي مدرب قريب، ودعم متخصص، ومعلومات وصول واضحة، وتصعيد تلقائي إذا لم يستجب أحد."></p>
          </div>
          <div class="hero-stats">
            <div class="hero-stat"><strong data-en="Skills + distance" data-ar="المهارات + المسافة"></strong><span data-en="explainable matching" data-ar="مطابقة قابلة للتفسير"></span></div>
            <div class="hero-stat"><strong data-en="2-level relay" data-ar="سلسلة من مستويين"></strong><span data-en="community + specialist" data-ar="المجتمع + المتخصص"></span></div>
            <div class="hero-stat"><strong data-en="Low-signal ready" data-ar="جاهز لضعف الشبكة"></strong><span data-en="copyable rescue packet" data-ar="حزمة إنقاذ قابلة للنسخ"></span></div>
          </div>
        </section>

        <section class="section">
          <h3 data-en="Create a rural rescue relay" data-ar="أنشئ سلسلة إنقاذ ريفية"></h3>
          <p data-en="Complete the four short steps. The responder network is simulated for this hackathon prototype." data-ar="أكمل الخطوات الأربع القصيرة. شبكة المستجيبين تجريبية في هذا النموذج."></p>
          <div class="grid">
            <article class="card">
              <span class="step">1</span><h4 data-en="What happened?" data-ar="ماذا حدث؟"></h4><p class="copy" data-en="Choose the emergency so DesertReach can match the right skills and equipment." data-ar="اختر نوع الطوارئ حتى يطابق DesertReach المهارات والمعدات المناسبة."></p>
              <div class="emergency-grid">
                <button class="choice emergency" data-type="Medical"><span>🩺</span><strong data-en="Medical" data-ar="حالة طبية"></strong></button>
                <button class="choice emergency" data-type="Vehicle"><span>🚙</span><strong data-en="Vehicle or sand" data-ar="مركبة أو رمال"></strong></button>
                <button class="choice emergency" data-type="Fire"><span>🔥</span><strong data-en="Fire or smoke" data-ar="حريق أو دخان"></strong></button>
                <button class="choice emergency" data-type="Lost"><span>🧭</span><strong data-en="Lost person" data-ar="شخص مفقود"></strong></button>
                <button class="choice emergency" data-type="Farm"><span>🐪</span><strong data-en="Farm or animal" data-ar="مزرعة أو حيوان"></strong></button>
                <button class="choice emergency" data-type="Safety"><span>🛡️</span><strong data-en="Personal safety" data-ar="السلامة الشخصية"></strong></button>
              </div>
            </article>

            <article class="card">
              <span class="step">2</span><h4 data-en="How urgent and where?" data-ar="ما مدى الاستعجال وأين؟"></h4><p class="copy" data-en="Priority changes the escalation speed. Use the safe demo location when testing." data-ar="تؤثر الأولوية على سرعة التصعيد. استخدم الموقع التجريبي الآمن للاختبار."></p>
              <div class="priority-grid">
                <button class="priority" data-priority="Critical"><strong data-en="Critical" data-ar="حرجة"></strong><small data-en="Life may be at risk" data-ar="قد تكون الحياة في خطر"></small></button>
                <button class="priority" data-priority="Urgent"><strong data-en="Urgent" data-ar="عاجلة"></strong><small data-en="Help needed quickly" data-ar="المساعدة مطلوبة بسرعة"></small></button>
                <button class="priority" data-priority="Assistance"><strong data-en="Assistance" data-ar="مساعدة"></strong><small data-en="Important, not life-threatening" data-ar="مهمة وليست مهددة للحياة"></small></button>
              </div>
              <div class="location-box">
                <div class="location-status"><div class="location-icon">📍</div><div><strong id="locationTitle" data-en="Location not shared yet" data-ar="لم تتم مشاركة الموقع بعد"></strong><small id="locationDetails" data-en="Your coordinates will appear here." data-ar="ستظهر الإحداثيات هنا."></small></div></div>
                <div class="row"><button id="useLocationButton" class="btn primary" data-en="Use my location" data-ar="استخدم موقعي"></button><button id="demoLocationButton" class="btn secondary" data-en="Use Al Qua'a demo location" data-ar="استخدم موقع القوع التجريبي"></button></div>
              </div>
            </article>

            <article class="card">
              <span class="step">3</span><h4 data-en="Rural Access Card" data-ar="بطاقة الوصول الريفية"></h4><p class="copy" data-en="Coordinates are not enough in farms and desert areas. Tell the responder how to reach you safely." data-ar="الإحداثيات وحدها لا تكفي في المزارع والمناطق الصحراوية. أخبر المستجيب بكيفية الوصول بأمان."></p>
              <div class="form">
                <div class="field full"><label data-en="Nearest landmark" data-ar="أقرب معلم"></label><input id="landmark" data-placeholder-en="e.g. water tower or mosque" data-placeholder-ar="مثال: برج مياه أو مسجد"></div>
                <div class="field"><label data-en="Farm / gate number" data-ar="رقم المزرعة / البوابة"></label><input id="gateNumber" data-placeholder-en="e.g. Gate 3" data-placeholder-ar="مثال: البوابة 3"></div>
                <div class="field"><label data-en="Vehicle / building description" data-ar="وصف المركبة / المبنى"></label><input id="visualDescription" data-placeholder-en="e.g. white pickup" data-placeholder-ar="مثال: مركبة بيضاء"></div>
              </div>
              <div class="toggle-grid">
                <label class="toggle"><input id="needs4x4" type="checkbox"><span data-en="4×4 vehicle required" data-ar="مركبة دفع رباعي مطلوبة"></span></label>
                <label class="toggle"><input id="gateLocked" type="checkbox"><span data-en="Gate may be locked" data-ar="قد تكون البوابة مغلقة"></span></label>

    function switchView(v){const resident=v==="resident";el.residentView.classList.toggle("active",resident);el.responderView.classList.toggle("active",!resident);el.residentTab.classList.toggle("active",resident);el.responderTab.classList.toggle("active",!resident);window.scrollTo({top:0,behavior:"smooth"})}
    const rad=v=>v*Math.PI/180;
    function distance(lat1,lng1,lat2,lng2){const R=6371,dLat=rad(lat2-lat1),dLng=rad(lng2-lng1);const a=Math.sin(dLat/2)**2+Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
    function mapPosition(lat,lng){return{x:Math.max(7,Math.min(93,50+(lng-DEMO_CENTER.lng)*1200)),y:Math.max(7,Math.min(93,50-(lat-DEMO_CENTER.lat)*1200))}}
    function initMap(){responders.forEach((r,i)=>{const p=mapPosition(r.lat,r.lng),m=document.createElement("div"),label=document.createElement("div");m.className="map-marker "+(r.kind==="specialist"?"specialist":"responder");m.style.left=p.x+"%";m.style.top=p.y+"%";m.textContent=r.kind==="specialist"?"S":String(i+1);m.title=r.name+" — "+r.roleEn;label.className="marker-name";label.style.left=p.x+"%";label.style.top=p.y+"%";label.textContent=r.name;el.mapStage.appendChild(m);el.mapStage.appendChild(label)})}
    function setLocation(lat,lng,isDemo){residentLocation={lat,lng,isDemo};updateLocationText();const p=mapPosition(lat,lng);el.userMarker.style.left=p.x+"%";el.userMarker.style.top=p.y+"%";el.userMarker.classList.add("show");updateSubmit()}
    function updateLocationText(){el.locationTitle.textContent=residentLocation.isDemo?tr("demoReady"):tr("locationReady");el.locationDetails.textContent=residentLocation.lat.toFixed(5)+", "+residentLocation.lng.toFixed(5)}
    function updateSubmit(){el.requestHelpButton.disabled=!(selectedEmergency&&selectedPriority&&residentLocation)}
    function scoreResponder(r,kind){let score=100;if(!r.types.includes(selectedEmergency))return-9999;const km=distance(residentLocation.lat,residentLocation.lng,r.lat,r.lng);score-=km*4;if(kind==="primary"&&r.kind==="community")score+=25;if(kind==="backup"&&r.kind==="specialist")score+=35;if(el.needs4x4.checked){score+=r.fourByFour?28:-120}if(selectedPriority==="Critical"&&r.kind==="specialist")score+=8;return score}
    function matchRelay(){const primary=responders.filter(r=>r.kind==="community").map(r=>({...r,distanceKm:distance(residentLocation.lat,residentLocation.lng,r.lat,r.lng),score:scoreResponder(r,"primary")})).sort((a,b)=>b.score-a.score)[0];let backup=responders.filter(r=>r.kind==="specialist").map(r=>({...r,distanceKm:distance(residentLocation.lat,residentLocation.lng,r.lat,r.lng),score:scoreResponder(r,"backup")})).sort((a,b)=>b.score-a.score)[0];if(!backup||backup.score<-500){backup=responders.filter(r=>r.id!==primary.id&&r.types.includes(selectedEmergency)).map(r=>({...r,distanceKm:distance(residentLocation.lat,residentLocation.lng,r.lat,r.lng),score:scoreResponder(r,"backup")})).sort((a,b)=>b.score-a.score)[0]}return{primary,backup}}
    const eta=(km,r)=>Math.max(4,Math.round(km/(r.fourByFour?45:32)*60+3));
    function reasonsFor(r){const reasons=[];reasons.push(language==="en"?`${r.distanceKm.toFixed(2)} km from the resident`:`يبعد ${r.distanceKm.toFixed(2)} كم عن المقيم`);reasons.push(language==="en"?`Trained for ${emergencyNames[selectedEmergency].en.toLowerCase()}`:`مدرب على ${emergencyNames[selectedEmergency].ar}`);if(el.needs4x4.checked&&r.fourByFour)reasons.push(language==="en"?"Has 4×4 access for desert terrain":"يمتلك مركبة دفع رباعي للتضاريس الصحراوية");reasons.push(language==="en"?`Equipment: ${r.equipmentEn.slice(0,2).join(", ")}`:`المعدات: ${r.equipmentAr.slice(0,2).join("، ")}`);return reasons}
    function drawRoutes(){const u=mapPosition(currentRequest.location.lat,currentRequest.location.lng),p=mapPosition(currentRequest.primary.lat,currentRequest.primary.lng),b=mapPosition(currentRequest.backup.lat,currentRequest.backup.lng);[[el.primaryRoute,p],[el.backupRoute,b]].forEach(([line,target])=>{line.setAttribute("x1",u.x);line.setAttribute("y1",u.y);line.setAttribute("x2",target.x);line.setAttribute("y2",target.y);line.style.display="block"})}
    function accessText(){const parts=[];if(currentRequest.access.landmark)parts.push((language==="en"?"Landmark: ":"المعلم: ")+currentRequest.access.landmark);if(currentRequest.access.gateNumber)parts.push((language==="en"?"Gate/farm: ":"البوابة/المزرعة: ")+currentRequest.access.gateNumber);if(currentRequest.access.visualDescription)parts.push((language==="en"?"Visual: ":"الوصف: ")+currentRequest.access.visualDescription);if(currentRequest.access.needs4x4)parts.push(language==="en"?"4×4 required":"دفع رباعي مطلوب");if(currentRequest.access.gateLocked)parts.push(language==="en"?"Gate may be locked":"قد تكون البوابة مغلقة");if(currentRequest.access.animalsNearby)parts.push(language==="en"?"Animals nearby":"حيوانات قريبة");if(currentRequest.access.hazardNearby)parts.push(language==="en"?"Machinery/fire hazard":"خطر آلات/حريق");return parts.length?parts.join(" · "):tr("notProvided")}
    function createRequest(){if(!selectedEmergency){showToast(tr("selectEmergency"));return}if(!selectedPriority){showToast(tr("selectPriority"));return}if(!residentLocation){showToast(tr("shareLocation"));return}const relay=matchRelay();currentRequest={id:"DR-"+Date.now().toString().slice(-6),emergencyType:selectedEmergency,priority:selectedPriority,residentName:el.residentName.value.trim()||tr("noName"),residentPhone:el.residentPhone.value.trim(),notes:el.residentNotes.value.trim()||tr("noNotes"),location:{...residentLocation},access:{landmark:el.landmark.value.trim(),gateNumber:el.gateNumber.value.trim(),visualDescription:el.visualDescription.value.trim(),needs4x4:el.needs4x4.checked,gateLocked:el.gateLocked.checked,animalsNearby:el.animalsNearby.checked,hazardNearby:el.hazardNearby.checked},primary:{...relay.primary,etaMinutes:eta(relay.primary.distanceKm,relay.primary)},backup:{...relay.backup,etaMinutes:eta(relay.backup.distanceKm,relay.backup)},activeLevel:"primary",status:"waiting",createdAt:new Date().toISOString(),countdownRemaining:selectedPriority==="Critical"?25:selectedPriority==="Urgent"?40:60};countdownRemaining=currentRequest.countdownRemaining;save();drawRoutes();renderRequest();startCountdown();el.resultPanel.classList.add("show");el.resultPanel.scrollIntoView({behavior:"smooth",block:"start"});showToast(tr("requestCreated"))}
    function activeResponder(){return currentRequest.activeLevel==="backup"?currentRequest.backup:currentRequest.primary}
    function statusText(){return currentRequest.status==="waiting"?tr("waiting"):currentRequest.status==="backup_alerted"?tr("backupAlerted"):currentRequest.status==="accepted"?tr("accepted"):currentRequest.status==="on_way"?tr("onWay"):tr("arrived")}
    function timelineItems(){const items=[{done:true,en:"Request, priority and rural access details received.",ar:"تم استلام الطلب والأولوية وتفاصيل الوصول الريفي."},{done:true,en:"Nearby suitable community responder matched.",ar:"تمت مطابقة مستجيب مجتمعي قريب ومناسب."},{done:currentRequest.activeLevel==="backup"||["accepted","on_way","arrived"].includes(currentRequest.status),pending:currentRequest.status==="waiting",en:currentRequest.activeLevel==="backup"?"Specialist backup alerted.":"Waiting for primary responder acceptance.",ar:currentRequest.activeLevel==="backup"?"تم تنبيه الدعم المتخصص.":"بانتظار قبول المستجيب القريب."},{done:["accepted","on_way","arrived"].includes(currentRequest.status),pending:!["accepted","on_way","arrived"].includes(currentRequest.status),en:"Responder accepted the request.",ar:"وافق المستجيب على الطلب."},{done:["on_way","arrived"].includes(currentRequest.status),pending:currentRequest.status==="accepted",en:"Responder is on the way.",ar:"المستجيب في الطريق."},{done:currentRequest.status==="arrived",pending:currentRequest.status==="on_way",en:"Responder arrived at the location.",ar:"وصل المستجيب إلى الموقع."}];return items}
    function renderRequest(){if(!currentRequest)return;const p=currentRequest.primary,b=currentRequest.backup,active=activeResponder(),roleP=language==="ar"?p.roleAr:p.roleEn,roleB=language==="ar"?b.roleAr:b.roleEn;el.resultPanel.classList.add("show");el.resultRequestId.textContent=tr("requestId")+": "+currentRequest.id;el.residentStatusPill.textContent=statusText();el.countdownTitle.textContent=tr("countdownTitle")+": "+Math.max(0,countdownRemaining)+"s";el.countdownCopy.textContent=currentRequest.activeLevel==="backup"?(language==="en"?"The specialist backup is now the active responder.":"أصبح الدعم المتخصص هو المستجيب النشط."):tr("countdownCopy");el.triggerBackupButton.disabled=currentRequest.activeLevel==="backup"||["accepted","on_way","arrived"].includes(currentRequest.status);el.primaryName.textContent=p.name;el.primaryRole.textContent=roleP;el.primaryDistance.textContent=p.distanceKm.toFixed(2)+" km";el.primaryEta.textContent=p.etaMinutes+" "+tr("minutes");el.backupName.textContent=b.name;el.backupRole.textContent=roleB;el.backupDistance.textContent=b.distanceKm.toFixed(2)+" km";el.backupEta.textContent=b.etaMinutes+" "+tr("minutes");el.matchReasons.innerHTML=reasonsFor(active).map(x=>"<li>"+x+"</li>").join("");el.safetyGuidance.innerHTML=guidance[currentRequest.emergencyType][language].map(x=>"<li>"+x+"</li>").join("");el.residentTimeline.innerHTML=timelineItems().map(i=>`<li><span class="check ${i.done?"":i.pending?"pending":"grey"}">${i.done?"✓":i.pending?"…":"○"}</span><span>${language==="en"?i.en:i.ar}</span></li>`).join("");el.requestEmpty.style.display="none";el.requestCard.classList.add("show");el.dashboardOpenRequests.textContent=currentRequest.status==="arrived"?"0":"1";el.dashboardActiveResponder.textContent=active.name;el.dashboardPriority.textContent=priorityNames[currentRequest.priority][language];el.dashboardEmergencyType.textContent=emergencyNames[currentRequest.emergencyType][language];el.dashboardRequestTime.textContent=new Date(currentRequest.createdAt).toLocaleTimeString(language==="ar"?"ar-AE":"en-AE",{hour:"2-digit",minute:"2-digit"});el.dashboardRequestId.textContent=currentRequest.id;el.dashboardResidentName.textContent=currentRequest.residentName;el.dashboardCoordinates.textContent=currentRequest.location.lat.toFixed(5)+", "+currentRequest.location.lng.toFixed(5);el.dashboardPriorityDetail.textContent=priorityNames[currentRequest.priority][language];el.dashboardResponder.textContent=active.name+" · "+(language==="ar"?active.roleAr:active.roleEn);el.dashboardNotes.textContent=currentRequest.notes;el.dashboardAccess.textContent=accessText();el.dashboardReasons.innerHTML=reasonsFor(active).map(x=>"<li>"+x+"</li>").join("");const accepted=["accepted","on_way","arrived"].includes(currentRequest.status);el.acceptRequestButton.disabled=accepted;el.onWayButton.disabled=!accepted||["on_way","arrived"].includes(currentRequest.status);el.arrivedButton.disabled=currentRequest.status!=="on_way";el.declineButton.disabled=currentRequest.activeLevel==="backup"||accepted;drawRoutes()}
    function save(){localStorage.setItem("desertReachRelay",JSON.stringify(currentRequest))}
    function startCountdown(){clearInterval(countdownTimer);if(!currentRequest||currentRequest.activeLevel==="backup"||["accepted","on_way","arrived"].includes(currentRequest.status))return;countdownTimer=setInterval(()=>{countdownRemaining--;currentRequest.countdownRemaining=countdownRemaining;el.countdownTitle.textContent=tr("countdownTitle")+": "+Math.max(0,countdownRemaining)+"s";if(countdownRemaining<=0)triggerBackup()},1000)}
    function triggerBackup(){if(!currentRequest||currentRequest.activeLevel==="backup")return;clearInterval(countdownTimer);currentRequest.activeLevel="backup";currentRequest.status="backup_alerted";currentRequest.countdownRemaining=0;countdownRemaining=0;save();renderRequest();showToast(tr("backupTriggered"))}
    function acceptRequest(){if(!currentRequest)return;clearInterval(countdownTimer);currentRequest.status="accepted";save();renderRequest();showToast(tr("requestAccepted"))}
    function markOnWay(){if(!currentRequest||currentRequest.status!=="accepted")return;currentRequest.status="on_way";save();renderRequest();showToast(tr("statusOnWay"))}
    function markArrived(){if(!currentRequest||currentRequest.status!=="on_way")return;currentRequest.status="arrived";save();renderRequest();showToast(tr("statusArrived"))}
    function fallback(){if(!currentRequest)return"";const active=activeResponder();return["DESERTREACH RESCUE PACKET","Request: "+currentRequest.id,"Emergency: "+currentRequest.emergencyType,"Priority: "+currentRequest.priority,"Location: "+currentRequest.location.lat.toFixed(5)+", "+currentRequest.location.lng.toFixed(5),"Map: https://www.openstreetmap.org/?mlat="+currentRequest.location.lat+"&mlon="+currentRequest.location.lng,"Resident: "+currentRequest.residentName,"Landmark: "+(currentRequest.access.landmark||"Not provided"),"Gate/Farm: "+(currentRequest.access.gateNumber||"Not provided"),"4x4 required: "+(currentRequest.access.needs4x4?"Yes":"No"),"Hazards: "+[currentRequest.access.animalsNearby?"animals":"",currentRequest.access.hazardNearby?"machinery/fire":""].filter(Boolean).join(", "),"Active responder: "+active.name,"Note: "+currentRequest.notes,"Prototype only — contact official emergency services in a real emergency."].join("\n")}
    async function copyFallback(){const m=fallback();if(!m)return;try{await navigator.clipboard.writeText(m);showToast(tr("copied"))}catch(e){window.prompt("Copy this rescue packet:",m);showToast(tr("copyError"))}}
    function resetDemo(){clearInterval(countdownTimer);localStorage.removeItem("desertReachRelay");location.reload()}
    function restore(){const saved=localStorage.getItem("desertReachRelay");if(!saved)return;try{currentRequest=JSON.parse(saved);selectedEmergency=currentRequest.emergencyType;selectedPriority=currentRequest.priority;residentLocation=currentRequest.location;countdownRemaining=currentRequest.countdownRemaining??0;el.emergency.forEach(b=>b.classList.toggle("selected",b.dataset.type===selectedEmergency));el.priority.forEach(b=>b.classList.toggle("selected",b.dataset.priority===selectedPriority));setLocation(residentLocation.lat,residentLocation.lng,residentLocation.isDemo);el.landmark.value=currentRequest.access.landmark||"";el.gateNumber.value=currentRequest.access.gateNumber||"";el.visualDescription.value=currentRequest.access.visualDescription||"";el.needs4x4.checked=!!currentRequest.access.needs4x4;el.gateLocked.checked=!!currentRequest.access.gateLocked;el.animalsNearby.checked=!!currentRequest.access.animalsNearby;el.hazardNearby.checked=!!currentRequest.access.hazardNearby;renderRequest();startCountdown()}catch(e){localStorage.removeItem("desertReachRelay")}}
    el.emergency.forEach(b=>b.addEventListener("click",()=>{selectedEmergency=b.dataset.type;el.emergency.forEach(i=>i.classList.toggle("selected",i===b));updateSubmit()}));
    el.priority.forEach(b=>b.addEventListener("click",()=>{selectedPriority=b.dataset.priority;el.priority.forEach(i=>i.classList.toggle("selected",i===b));updateSubmit()}));
    el.useLocationButton.addEventListener("click",()=>{if(!navigator.geolocation){showToast(tr("locationError"));return}showToast(tr("locating"));navigator.geolocation.getCurrentPosition(p=>{setLocation(p.coords.latitude,p.coords.longitude,false);showToast(tr("locationSuccess"))},()=>showToast(tr("locationError")),{enableHighAccuracy:true,timeout:10000,maximumAge:0})});
    el.demoLocationButton.addEventListener("click",()=>{setLocation(DEMO_CENTER.lat,DEMO_CENTER.lng,true);showToast(tr("demoSuccess"))});
    el.requestHelpButton.addEventListener("click",createRequest);el.triggerBackupButton.addEventListener("click",triggerBackup);el.openResponderButton.addEventListener("click",()=>switchView("responder"));el.copyFallbackButton.addEventListener("click",copyFallback);el.acceptRequestButton.addEventListener("click",acceptRequest);el.onWayButton.addEventListener("click",markOnWay);el.arrivedButton.addEventListener("click",markArrived);el.declineButton.addEventListener("click",triggerBackup);el.backToResidentButton.addEventListener("click",()=>switchView("resident"));el.residentTab.addEventListener("click",()=>switchView("resident"));el.responderTab.addEventListener("click",()=>switchView("responder"));el.languageButton.addEventListener("click",()=>{language=language==="en"?"ar":"en";applyLanguage()});el.resetButton.addEventListener("click",resetDemo);
    initMap();applyLanguage();restore();
  </script>
