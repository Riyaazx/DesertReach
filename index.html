<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DesertReach helps residents in dispersed rural communities reach the nearest available responder.">
  <title>DesertReach | Rural Emergency Coordination</title>
  <style>
    :root{
      --green:#0a7667;--green2:#0d8f7b;--dark:#073f37;--mint:#dff5ef;--bg:#f6fbf8;
      --ink:#16211f;--muted:#66736f;--line:#dfe8e4;--red:#cf4040;--success:#17894f;
      --sand:#f3e4c6;--white:#fff;--shadow:0 18px 48px rgba(18,58,49,.12)
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;color:var(--ink);background:linear-gradient(180deg,#fffdf8,var(--bg));font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}
    button,input,textarea{font:inherit}button{cursor:pointer}
    .notice{padding:9px 16px;text-align:center;color:#fff;background:var(--dark);font-size:.82rem;font-weight:800}
    .app{width:min(1180px,calc(100% - 28px));margin:auto;padding-bottom:44px}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 0 17px}
    .brand{display:flex;align-items:center;gap:12px}.logo{display:grid;place-items:center;width:48px;height:48px;border-radius:15px;color:#fff;background:linear-gradient(145deg,var(--green2),var(--dark));font-size:1.3rem}.brand h1{margin:0;font-size:1.7rem}.brand p{margin:5px 0 0;color:var(--muted);font-size:.82rem}
    .nav{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px}.nav button{min-height:42px;padding:0 14px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--dark);font-weight:850}.nav button.active{color:#fff;background:var(--green);border-color:var(--green)}
    .view{display:none}.view.active{display:block}
    .hero{display:grid;grid-template-columns:1.35fr .65fr;gap:28px;align-items:center;padding:clamp(28px,5vw,54px);border-radius:30px;color:#fff;background:linear-gradient(110deg,var(--dark),var(--green2));box-shadow:var(--shadow)}
    .eyebrow{display:inline-block;padding:8px 12px;border:1px solid rgba(255,255,255,.28);border-radius:999px;background:rgba(255,255,255,.1);font-size:.78rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase}.hero h2{margin:18px 0 12px;font-size:clamp(2rem,5vw,4rem);line-height:1.03}.hero p{margin:0;color:rgba(255,255,255,.84);line-height:1.7}
    .hero-stats{display:grid;gap:12px}.hero-stat{padding:18px;border:1px solid rgba(255,255,255,.2);border-radius:18px;background:rgba(255,255,255,.11)}.hero-stat strong{display:block;font-size:1.4rem}.hero-stat span{display:block;margin-top:5px;color:rgba(255,255,255,.76);font-size:.82rem}
    .section{margin-top:24px}.section h3{margin:0;font-size:clamp(1.4rem,3vw,2rem)}.section>p{margin:6px 0 14px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.card{padding:clamp(19px,3vw,28px);border:1px solid var(--line);border-radius:26px;background:#fff;box-shadow:0 12px 34px rgba(24,58,49,.08)}
    .step{display:inline-grid;place-items:center;min-width:34px;height:34px;margin-bottom:12px;padding:0 9px;border-radius:10px;color:var(--dark);background:var(--mint);font-weight:900}.card h4{margin:0 0 7px;font-size:1.12rem}.copy{margin:0 0 18px;color:var(--muted);line-height:1.55;font-size:.92rem}
    .emergency-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.emergency{min-height:98px;padding:14px 10px;border:1px solid var(--line);border-radius:15px;background:#fff;color:var(--ink);transition:.18s}.emergency:hover{transform:translateY(-2px);border-color:var(--green)}.emergency.selected{border-color:var(--green);background:#ecfaf6;box-shadow:inset 0 0 0 2px rgba(11,141,121,.12)}.emergency span{display:block;margin-bottom:7px;font-size:1.5rem}.emergency strong{font-size:.82rem}
    .location-box{padding:16px;border:1px dashed #deb875;border-radius:16px;background:#fffaf1}.location-status{display:flex;gap:12px;margin-bottom:14px}.location-icon{display:grid;place-items:center;flex:0 0 40px;height:40px;border-radius:12px;background:#f7ecd8}.location-status strong{display:block}.location-status small{display:block;margin-top:4px;color:var(--muted);word-break:break-word}
    .row{display:flex;flex-wrap:wrap;gap:9px}.btn{min-height:45px;padding:0 16px;border:0;border-radius:13px;font-weight:900}.primary{color:#fff;background:var(--green)}.secondary{color:var(--dark);background:var(--mint)}.danger{color:#fff;background:var(--red)}.success{color:#fff;background:var(--success)}.btn:disabled{cursor:not-allowed;opacity:.5}
    .form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:grid;gap:7px}.field.full{grid-column:1/-1}.field label{font-size:.82rem;font-weight:850}.field input,.field textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#fbfcfc;outline:none}.field textarea{min-height:88px;resize:vertical}.field input:focus,.field textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(11,141,121,.1)}.privacy{margin:10px 0 0;color:var(--muted);font-size:.76rem;line-height:1.5}
    .map-stage{position:relative;width:100%;height:360px;overflow:hidden;border:1px solid var(--line);border-radius:18px;background:
      radial-gradient(circle at 18% 24%,rgba(10,118,103,.10) 0 5px,transparent 6px),
      radial-gradient(circle at 76% 68%,rgba(10,118,103,.08) 0 7px,transparent 8px),
      linear-gradient(23deg,transparent 49%,rgba(255,255,255,.65) 50%,transparent 51%),
      repeating-linear-gradient(0deg,transparent 0 36px,rgba(7,63,55,.055) 37px 38px),
      repeating-linear-gradient(90deg,transparent 0 48px,rgba(7,63,55,.05) 49px 50px),
      linear-gradient(135deg,#f7ead1,#f5f9f6 52%,#dff5ef)}
    .map-stage:before{content:"";position:absolute;left:-8%;top:48%;width:116%;height:18px;background:rgba(255,255,255,.88);transform:rotate(-10deg);box-shadow:0 0 0 1px rgba(7,63,55,.06)}
    .map-stage:after{content:"";position:absolute;left:36%;top:-10%;width:16px;height:120%;background:rgba(255,255,255,.72);transform:rotate(14deg);box-shadow:0 0 0 1px rgba(7,63,55,.05)}
    .map-label{position:absolute;z-index:4;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.9);color:var(--dark);font-size:.72rem;font-weight:850;box-shadow:0 5px 16px rgba(18,58,49,.1)}
    .map-label.one{left:8%;top:10%}.map-label.two{right:8%;bottom:9%}
    .route-svg{position:absolute;inset:0;z-index:2;width:100%;height:100%;pointer-events:none}.route-line{stroke:var(--green2);stroke-width:4;stroke-dasharray:9 7;stroke-linecap:round}
    .map-marker{position:absolute;z-index:5;transform:translate(-50%,-50%);display:grid;place-items:center;width:34px;height:34px;border:4px solid #fff;border-radius:50%;box-shadow:0 8px 18px rgba(18,58,49,.18);font-size:.84rem;font-weight:900}.map-marker.responder{background:var(--green);color:#fff}.map-marker.user{display:none;background:var(--red);color:#fff}.map-marker.user.show{display:grid}.marker-name{position:absolute;z-index:6;transform:translate(-50%,10px);padding:4px 7px;border-radius:7px;background:#fff;color:var(--dark);font-size:.68rem;font-weight:800;white-space:nowrap;box-shadow:0 4px 12px rgba(18,58,49,.12)}
    .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;color:var(--muted);font-size:.78rem}.dot{display:inline-block;width:9px;height:9px;margin-right:6px;border-radius:50%}.dot.red{background:var(--red)}.dot.green{background:var(--green)}
    .result{display:none;margin-top:20px;border:1px solid rgba(22,133,84,.25);border-radius:24px;overflow:hidden;background:#eefaf3}.result.show{display:block}.result-head{display:flex;justify-content:space-between;gap:12px;padding:18px 20px;color:#fff;background:var(--success)}.result-head strong{display:block}.result-head small{display:block;margin-top:4px;color:rgba(255,255,255,.82)}.pill{align-self:flex-start;padding:7px 10px;border-radius:999px;color:var(--success);background:#fff;font-size:.74rem;font-weight:900}.result-body{padding:20px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{padding:13px;border:1px solid rgba(22,133,84,.16);border-radius:14px;background:rgba(255,255,255,.85)}.metric span{display:block;color:var(--muted);font-size:.72rem}.metric strong{display:block;margin-top:5px;font-size:.92rem}.timeline{display:grid;gap:11px;margin:18px 0 0;padding:0;list-style:none}.timeline li{display:flex;gap:10px;color:var(--muted);font-size:.85rem}.check{display:grid;place-items:center;flex:0 0 24px;height:24px;border-radius:50%;color:#fff;background:var(--success);font-size:.72rem;font-weight:900}.check.pending{color:#b86a00;background:#fff7e5}
    .dashboard{display:grid;grid-template-columns:.8fr 1.2fr;gap:20px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{padding:16px;border-radius:15px;background:#ecfaf6}.stat strong{display:block;color:var(--dark);font-size:1.3rem}.stat span{display:block;margin-top:4px;color:var(--muted);font-size:.76rem}.empty{padding:36px 18px;border:1px dashed var(--line);border-radius:16px;text-align:center;color:var(--muted);background:#fbfcfc}.request-card{display:none;border:1px solid rgba(207,69,69,.2);border-radius:18px;overflow:hidden}.request-card.show{display:block}.request-head{display:flex;justify-content:space-between;gap:12px;padding:15px 17px;color:var(--red);background:#fff0f0}.request-body{padding:17px}.request-details{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px}.detail{padding:11px;border-radius:12px;background:#f7f9f8}.detail span{display:block;color:var(--muted);font-size:.69rem;font-weight:750}.detail strong{display:block;margin-top:4px;font-size:.84rem;word-break:break-word}
    .proofs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.proof{padding:20px;border:1px solid var(--line);border-radius:18px;background:#fff}.proof b{display:block;margin:8px 0}.proof p{margin:0;color:var(--muted);font-size:.83rem;line-height:1.55}
    footer{display:flex;justify-content:space-between;gap:20px;margin-top:32px;padding-top:24px;border-top:1px solid var(--line);color:var(--muted);font-size:.78rem}.toast{position:fixed;right:18px;bottom:18px;z-index:9999;max-width:390px;padding:14px 16px;border-radius:14px;color:#fff;background:var(--dark);box-shadow:var(--shadow);opacity:0;transform:translateY(14px);pointer-events:none;transition:.22s}.toast.show{opacity:1;transform:none}[dir="rtl"] .toast{right:auto;left:18px}
    @media(max-width:900px){.hero,.grid,.dashboard{grid-template-columns:1fr}.hero-stats{grid-template-columns:repeat(3,1fr)}.metrics{grid-template-columns:1fr 1fr}}
    @media(max-width:650px){.app{width:calc(100% - 18px)}header{align-items:flex-start}.brand p{display:none}.hero{padding:26px 20px;border-radius:23px}.hero-stats,.emergency-grid,.proofs{grid-template-columns:1fr 1fr}.form,.request-details{grid-template-columns:1fr}.field.full{grid-column:auto}.map-stage{height:310px}footer{flex-direction:column}}
    @media(max-width:430px){.hero-stats,.emergency-grid,.proofs,.stats,.metrics{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="notice" data-en="Hackathon prototype only — not an official emergency service. Contact official emergency services during a real emergency." data-ar="نموذج أولي للهاكاثون فقط — وليس خدمة طوارئ رسمية. تواصل مع خدمات الطوارئ الرسمية في الحالات الحقيقية."></div>
  <div class="app">
    <header>
      <div class="brand"><div class="logo">⌖</div><div><h1>DesertReach</h1><p data-en="Fast help for dispersed rural communities" data-ar="مساعدة سريعة للمجتمعات الريفية المتباعدة"></p></div></div>
      <div class="nav"><button id="residentTab" class="active" data-en="Resident" data-ar="المقيم"></button><button id="responderTab" data-en="Responder" data-ar="المستجيب"></button><button id="languageButton">العربية</button></div>
    </header>
    <main>
      <section id="residentView" class="view active">
        <section class="hero">
          <div><span class="eyebrow" data-en="Tatweer Challenge 2" data-ar="تحدي تطوير 2"></span><h2 data-en="Reach the nearest available help in the first critical minutes." data-ar="الوصول إلى أقرب مساعدة متاحة في الدقائق الحرجة الأولى."></h2><p data-en="DesertReach captures a resident's location, matches the nearest suitable community responder, and keeps both sides updated through one clear emergency flow." data-ar="يلتقط DesertReach موقع المقيم، ويطابقه مع أقرب مستجيب مجتمعي مناسب، ويبقي الطرفين على اطلاع ضمن مسار طوارئ واضح."></p></div>
          <div class="hero-stats"><div class="hero-stat"><strong data-en="1 tap" data-ar="ضغطة واحدة"></strong><span data-en="to start a help request" data-ar="لبدء طلب المساعدة"></span></div><div class="hero-stat"><strong data-en="Nearest first" data-ar="الأقرب أولاً"></strong><span data-en="distance-based matching" data-ar="مطابقة حسب المسافة"></span></div><div class="hero-stat"><strong data-en="Bilingual" data-ar="ثنائي اللغة"></strong><span data-en="English and Arabic" data-ar="العربية والإنجليزية"></span></div></div>
        </section>
        <section class="section">
          <h3 data-en="Request community help" data-ar="اطلب مساعدة مجتمعية"></h3><p data-en="Complete the three steps below. This prototype uses simulated responder data." data-ar="أكمل الخطوات الثلاث أدناه. يستخدم هذا النموذج بيانات مستجيبين تجريبية."></p>
          <div class="grid">
            <article class="card"><span class="step">1</span><h4 data-en="What type of help do you need?" data-ar="ما نوع المساعدة التي تحتاجها؟"></h4><p class="copy" data-en="Choose the closest category so the most suitable responder can be matched." data-ar="اختر الفئة الأقرب حتى تتم مطابقتك مع أنسب مستجيب."></p><div class="emergency-grid">
              <button class="emergency" data-type="Medical"><span>🩺</span><strong data-en="Medical" data-ar="حالة طبية"></strong></button>
              <button class="emergency" data-type="Vehicle"><span>🚙</span><strong data-en="Vehicle breakdown" data-ar="عطل مركبة"></strong></button>
              <button class="emergency" data-type="Fire"><span>🔥</span><strong data-en="Fire or smoke" data-ar="حريق أو دخان"></strong></button>
              <button class="emergency" data-type="Lost"><span>🧭</span><strong data-en="Lost person" data-ar="شخص مفقود"></strong></button>
              <button class="emergency" data-type="Farm"><span>🐪</span><strong data-en="Farm or animal" data-ar="مزرعة أو حيوان"></strong></button>
              <button class="emergency" data-type="Safety"><span>🛡️</span><strong data-en="Personal safety" data-ar="السلامة الشخصية"></strong></button>
            </div></article>
            <article class="card"><span class="step">2</span><h4 data-en="Share your location" data-ar="شارك موقعك"></h4><p class="copy" data-en="Use your device location, or choose the safe demo location for testing." data-ar="استخدم موقع جهازك أو اختر موقع العرض الآمن للتجربة."></p><div class="location-box"><div class="location-status"><div class="location-icon">📍</div><div><strong id="locationTitle" data-en="Location not shared yet" data-ar="لم تتم مشاركة الموقع بعد"></strong><small id="locationDetails" data-en="Your coordinates will appear here after permission is granted." data-ar="ستظهر الإحداثيات هنا بعد منح الإذن."></small></div></div><div class="row"><button id="useLocationButton" class="btn primary" data-en="Use my location" data-ar="استخدم موقعي"></button><button id="demoLocationButton" class="btn secondary" data-en="Use demo location" data-ar="استخدم موقعاً تجريبياً"></button></div></div></article>
            <article class="card"><span class="step">3</span><h4 data-en="Add helpful details" data-ar="أضف تفاصيل مفيدة"></h4><p class="copy" data-en="Only the emergency type and location are required for this prototype." data-ar="نوع الطوارئ والموقع فقط مطلوبان في هذا النموذج."></p><div class="form"><div class="field"><label for="residentName" data-en="Name" data-ar="الاسم"></label><input id="residentName" maxlength="60" placeholder="e.g. Fatima"></div><div class="field"><label for="residentPhone" data-en="Phone" data-ar="الهاتف"></label><input id="residentPhone" maxlength="30" placeholder="Optional for prototype"></div><div class="field full"><label for="residentNotes" data-en="What happened?" data-ar="ماذا حدث؟"></label><textarea id="residentNotes" maxlength="240" placeholder="Add a short note for the responder"></textarea></div></div><button id="requestHelpButton" class="btn danger" style="width:100%;margin-top:16px;min-height:56px" disabled data-en="Request nearest help now" data-ar="اطلب أقرب مساعدة الآن"></button><p class="privacy" data-en="Prototype data stays in this browser and is not sent to a real emergency authority." data-ar="تبقى بيانات النموذج في هذا المتصفح ولا تُرسل إلى جهة طوارئ حقيقية."></p></article>
            <article class="card"><span class="step">⌖</span><h4 data-en="Schematic coordination map" data-ar="خريطة تنسيق توضيحية"></h4><p class="copy" data-en="A reliable offline-friendly view of the resident, responders and matched path." data-ar="عرض موثوق يعمل دون مكتبات خرائط خارجية للمقيم والمستجيبين والمسار المطابق."></p><div id="mapStage" class="map-stage"><span class="map-label one" data-en="Al Qua'a demo zone" data-ar="منطقة العرض في القوع"></span><span class="map-label two" data-en="Rural response network" data-ar="شبكة الاستجابة الريفية"></span><svg class="route-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><line id="routeLine" class="route-line" x1="50" y1="50" x2="50" y2="50" style="display:none"></line></svg><div id="userMarker" class="map-marker user">●</div></div><div class="legend"><span><i class="dot red"></i><span data-en="Resident location" data-ar="موقع المقيم"></span></span><span><i class="dot green"></i><span data-en="Available responder" data-ar="مستجيب متاح"></span></span></div></article>
          </div>
          <section id="resultPanel" class="result"><div class="result-head"><div><strong data-en="Help request created" data-ar="تم إنشاء طلب المساعدة"></strong><small id="resultRequestId"></small></div><span id="residentStatusPill" class="pill"></span></div><div class="result-body"><div class="metrics"><div class="metric"><span data-en="Matched responder" data-ar="المستجيب المطابق"></span><strong id="matchedResponder">—</strong></div><div class="metric"><span data-en="Role" data-ar="الدور"></span><strong id="matchedRole">—</strong></div><div class="metric"><span data-en="Straight-line distance" data-ar="المسافة بخط مستقيم"></span><strong id="matchedDistance">—</strong></div><div class="metric"><span data-en="Estimated arrival" data-ar="الوصول المتوقع"></span><strong id="matchedEta">—</strong></div></div><ul class="timeline"><li><span class="check">✓</span><span data-en="Location and emergency type received." data-ar="تم استلام الموقع ونوع الطوارئ."></span></li><li><span class="check">✓</span><span data-en="Nearest suitable available responder identified." data-ar="تم تحديد أقرب مستجيب مناسب ومتاح."></span></li><li id="acceptanceTimeline"></li></ul><div class="row" style="margin-top:17px"><button id="openResponderButton" class="btn secondary" data-en="Open responder view" data-ar="افتح واجهة المستجيب"></button><button id="copyFallbackButton" class="btn secondary" data-en="Copy fallback message" data-ar="انسخ رسالة بديلة"></button></div></div></section>
        </section>
        <section class="section"><h3 data-en="Designed for a rural setting" data-ar="مصمم لبيئة ريفية"></h3><p data-en="The prototype focuses on practical deployment, clear evidence and a simple first-minute workflow." data-ar="يركز النموذج على سهولة التطبيق والأدلة الواضحة ومسار بسيط للدقائق الأولى."></p><div class="proofs"><article class="proof">📶<b data-en="Low-connectivity fallback" data-ar="حل بديل عند ضعف الاتصال"></b><p data-en="Creates a compact emergency message with the category, coordinates and request ID." data-ar="ينشئ رسالة طوارئ مختصرة تتضمن الفئة والإحداثيات ورقم الطلب."></p></article><article class="proof">📍<b data-en="Nearest-first matching" data-ar="مطابقة الأقرب أولاً"></b><p data-en="Uses a transparent Haversine distance calculation to rank suitable responders." data-ar="يستخدم حساب مسافة واضحاً لترتيب المستجيبين المناسبين."></p></article><article class="proof">🧩<b data-en="Easy to extend" data-ar="سهل التوسع"></b><p data-en="Can later connect clinics, roadside teams, farms, volunteers and official services." data-ar="يمكن لاحقاً ربط العيادات وفرق الطرق والمزارع والمتطوعين والخدمات الرسمية."></p></article></div></section>
      </section>
      <section id="responderView" class="view"><section class="hero"><div><span class="eyebrow" data-en="Responder dashboard" data-ar="لوحة المستجيب"></span><h2 data-en="See the request, confirm availability and start responding." data-ar="شاهد الطلب وأكد التوفر وابدأ الاستجابة."></h2><p data-en="This view demonstrates the other side of the complete workflow using the same locally stored request." data-ar="توضح هذه الواجهة الطرف الآخر من المسار الكامل باستخدام الطلب نفسه المحفوظ محلياً."></p></div><div class="hero-stats"><div class="hero-stat"><strong id="dashboardOpenRequests">0</strong><span data-en="open requests" data-ar="طلبات مفتوحة"></span></div><div class="hero-stat"><strong>4</strong><span data-en="available responders" data-ar="مستجيبون متاحون"></span></div><div class="hero-stat"><strong id="dashboardAverageDistance">—</strong><span data-en="matched distance" data-ar="مسافة المطابقة"></span></div></div></section><section class="section dashboard"><article class="card"><h4 data-en="Community response network" data-ar="شبكة الاستجابة المجتمعية"></h4><p class="copy" data-en="Simulated responders show how different local resources could be coordinated." data-ar="يوضح المستجيبون التجريبيون كيف يمكن تنسيق الموارد المحلية المختلفة."></p><div class="stats"><div class="stat"><strong>2</strong><span data-en="community volunteers" data-ar="متطوعان مجتمعيان"></span></div><div class="stat"><strong>1</strong><span data-en="clinic vehicle" data-ar="مركبة عيادة"></span></div><div class="stat"><strong>1</strong><span data-en="roadside team" data-ar="فريق طريق"></span></div><div class="stat"><strong>100%</strong><span data-en="demo availability" data-ar="توفر تجريبي"></span></div></div></article><article class="card"><h4 data-en="Incoming help request" data-ar="طلب مساعدة وارد"></h4><p class="copy" data-en="Create a request in the Resident view to populate this dashboard." data-ar="أنشئ طلباً في واجهة المقيم لعرضه هنا."></p><div id="requestEmpty" class="empty" data-en="No active request yet." data-ar="لا يوجد طلب نشط بعد."></div><div id="requestCard" class="request-card"><div class="request-head"><strong id="dashboardEmergencyType">—</strong><small id="dashboardRequestTime">—</small></div><div class="request-body"><div class="request-details"><div class="detail"><span data-en="Request ID" data-ar="رقم الطلب"></span><strong id="dashboardRequestId">—</strong></div><div class="detail"><span data-en="Resident" data-ar="المقيم"></span><strong id="dashboardResidentName">—</strong></div><div class="detail"><span data-en="Coordinates" data-ar="الإحداثيات"></span><strong id="dashboardCoordinates">—</strong></div><div class="detail"><span data-en="Assigned responder" data-ar="المستجيب المكلّف"></span><strong id="dashboardResponder">—</strong></div><div class="detail"><span data-en="Distance" data-ar="المسافة"></span><strong id="dashboardDistance">—</strong></div><div class="detail"><span data-en="What happened?" data-ar="ماذا حدث؟"></span><strong id="dashboardNotes">—</strong></div></div><div class="row"><button id="acceptRequestButton" class="btn success" data-en="Accept request" data-ar="قبول الطلب"></button><button id="backToResidentButton" class="btn secondary" data-en="Back to resident view" data-ar="العودة إلى واجهة المقيم"></button></div></div></div></article></section></section>
    </main>
    <footer><span data-en="Built for Tatweer Hackathon 2026 · Challenge 2" data-ar="تم بناؤه لهاكاثون تطوير 2026 · التحدي 2"></span><span data-en="Prototype data and responders are simulated for demonstration." data-ar="بيانات النموذج والمستجيبون تجريبيون لأغراض العرض."></span></footer>
  </div>
  <div id="toast" class="toast"></div>
  <script>
    const DEMO_CENTER={lat:23.2335,lng:55.0493};
    const responders=[
      {name:"Aisha",roleEn:"Community First Responder",roleAr:"مستجيبة أولية مجتمعية",lat:23.2448,lng:55.0614,types:["Medical","Lost","Safety","Fire","Farm"]},
      {name:"Omar",roleEn:"Clinic Support Vehicle",roleAr:"مركبة دعم العيادة",lat:23.2207,lng:55.0404,types:["Medical","Fire","Safety"]},
      {name:"Saeed",roleEn:"Farm Safety Volunteer",roleAr:"متطوع سلامة المزارع",lat:23.2514,lng:55.0312,types:["Farm","Lost","Fire","Vehicle"]},
      {name:"Mariam",roleEn:"Roadside Support",roleAr:"دعم على الطريق",lat:23.2119,lng:55.0667,types:["Vehicle","Lost","Safety"]}
    ];
    const text={en:{waiting:"Waiting for acceptance",accepted:"Responder accepted",pending:"Waiting for the responder to accept.",acceptedLine:"Responder accepted and is preparing to travel.",locationReady:"Location ready",demoReady:"Demo location ready",selectEmergency:"Choose an emergency type first.",shareLocation:"Share a location before requesting help.",locating:"Requesting location permission…",locationSuccess:"Your device location is ready.",locationError:"Location could not be read. Use the demo location to continue.",demoSuccess:"Safe demo location selected.",requestCreated:"Request created. Open the responder view to continue the demo.",requestAccepted:"The responder accepted the request.",copied:"Fallback message copied.",copyError:"Could not copy automatically. Copy it manually.",noName:"Anonymous resident",noNotes:"No extra note provided",minutes:"min",requestId:"Request ID",acceptedButton:"Request accepted"},ar:{waiting:"بانتظار القبول",accepted:"وافق المستجيب",pending:"بانتظار قبول المستجيب.",acceptedLine:"وافق المستجيب ويستعد للتحرك.",locationReady:"الموقع جاهز",demoReady:"الموقع التجريبي جاهز",selectEmergency:"اختر نوع الطوارئ أولاً.",shareLocation:"شارك موقعاً قبل طلب المساعدة.",locating:"جارٍ طلب إذن الموقع…",locationSuccess:"موقع جهازك جاهز.",locationError:"تعذر قراءة الموقع. استخدم الموقع التجريبي للمتابعة.",demoSuccess:"تم اختيار الموقع التجريبي الآمن.",requestCreated:"تم إنشاء الطلب. افتح واجهة المستجيب لإكمال العرض.",requestAccepted:"وافق المستجيب على الطلب.",copied:"تم نسخ الرسالة البديلة.",copyError:"تعذر النسخ تلقائياً. انسخ الرسالة يدوياً.",noName:"مقيم مجهول",noNotes:"لا توجد ملاحظة إضافية",minutes:"دقيقة",requestId:"رقم الطلب",acceptedButton:"تم قبول الطلب"}};
    const emergencyNames={Medical:{en:"Medical",ar:"حالة طبية"},Vehicle:{en:"Vehicle breakdown",ar:"عطل مركبة"},Fire:{en:"Fire or smoke",ar:"حريق أو دخان"},Lost:{en:"Lost person",ar:"شخص مفقود"},Farm:{en:"Farm or animal",ar:"مزرعة أو حيوان"},Safety:{en:"Personal safety",ar:"السلامة الشخصية"}};
    let language="en",selectedEmergency=null,residentLocation=null,currentRequest=null;
    const $=id=>document.getElementById(id);const el={residentTab:$("residentTab"),responderTab:$("responderTab"),languageButton:$("languageButton"),residentView:$("residentView"),responderView:$("responderView"),emergency:[...document.querySelectorAll(".emergency")],useLocationButton:$("useLocationButton"),demoLocationButton:$("demoLocationButton"),locationTitle:$("locationTitle"),locationDetails:$("locationDetails"),residentName:$("residentName"),residentPhone:$("residentPhone"),residentNotes:$("residentNotes"),requestHelpButton:$("requestHelpButton"),resultPanel:$("resultPanel"),resultRequestId:$("resultRequestId"),residentStatusPill:$("residentStatusPill"),matchedResponder:$("matchedResponder"),matchedRole:$("matchedRole"),matchedDistance:$("matchedDistance"),matchedEta:$("matchedEta"),acceptanceTimeline:$("acceptanceTimeline"),openResponderButton:$("openResponderButton"),copyFallbackButton:$("copyFallbackButton"),requestEmpty:$("requestEmpty"),requestCard:$("requestCard"),dashboardOpenRequests:$("dashboardOpenRequests"),dashboardAverageDistance:$("dashboardAverageDistance"),dashboardEmergencyType:$("dashboardEmergencyType"),dashboardRequestTime:$("dashboardRequestTime"),dashboardRequestId:$("dashboardRequestId"),dashboardResidentName:$("dashboardResidentName"),dashboardCoordinates:$("dashboardCoordinates"),dashboardResponder:$("dashboardResponder"),dashboardDistance:$("dashboardDistance"),dashboardNotes:$("dashboardNotes"),acceptRequestButton:$("acceptRequestButton"),backToResidentButton:$("backToResidentButton"),toast:$("toast"),mapStage:$("mapStage"),userMarker:$("userMarker"),routeLine:$("routeLine")};
    const tr=key=>text[language][key];
    function applyLanguage(){document.documentElement.lang=language;document.documentElement.dir=language==="ar"?"rtl":"ltr";el.languageButton.textContent=language==="en"?"العربية":"English";document.querySelectorAll("[data-en][data-ar]").forEach(n=>n.textContent=n.getAttribute("data-"+language));el.residentName.placeholder=language==="en"?"e.g. Fatima":"مثال: فاطمة";el.residentPhone.placeholder=language==="en"?"Optional for prototype":"اختياري في النموذج";el.residentNotes.placeholder=language==="en"?"Add a short note for the responder":"أضف ملاحظة قصيرة للمستجيب";if(residentLocation)updateLocationText();if(currentRequest)renderRequest();}
    function showToast(m){el.toast.textContent=m;el.toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>el.toast.classList.remove("show"),2800)}
    function switchView(v){const resident=v==="resident";el.residentView.classList.toggle("active",resident);el.responderView.classList.toggle("active",!resident);el.residentTab.classList.toggle("active",resident);el.responderTab.classList.toggle("active",!resident);window.scrollTo({top:0,behavior:"smooth"})}
    function mapPosition(lat,lng){const x=Math.max(8,Math.min(92,50+(lng-DEMO_CENTER.lng)*1200));const y=Math.max(8,Math.min(92,50-(lat-DEMO_CENTER.lat)*1200));return{x,y}}
    function initMap(){responders.forEach((r,i)=>{const p=mapPosition(r.lat,r.lng);const m=document.createElement("div");m.className="map-marker responder";m.style.left=p.x+"%";m.style.top=p.y+"%";m.textContent=String(i+1);m.title=r.name+" — "+r.roleEn;const label=document.createElement("div");label.className="marker-name";label.style.left=p.x+"%";label.style.top=p.y+"%";label.textContent=r.name;el.mapStage.appendChild(m);el.mapStage.appendChild(label)})}
    function updateLocationText(){el.locationTitle.textContent=residentLocation.isDemo?tr("demoReady"):tr("locationReady");el.locationDetails.textContent=residentLocation.lat.toFixed(5)+", "+residentLocation.lng.toFixed(5)}
    function setLocation(lat,lng,isDemo){residentLocation={lat,lng,isDemo};updateLocationText();const p=mapPosition(lat,lng);el.userMarker.style.left=p.x+"%";el.userMarker.style.top=p.y+"%";el.userMarker.classList.add("show");updateSubmit()}
    function updateSubmit(){el.requestHelpButton.disabled=!(selectedEmergency&&residentLocation)}
    const rad=v=>v*Math.PI/180;
    function distance(lat1,lng1,lat2,lng2){const R=6371,dLat=rad(lat2-lat1),dLng=rad(lng2-lng1);const a=Math.sin(dLat/2)**2+Math.cos(rad(lat1))*Math.cos(rad(lat2))*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
    function matchResponder(type,location){return responders.filter(r=>r.types.includes(type)).map(r=>({...r,distanceKm:distance(location.lat,location.lng,r.lat,r.lng)})).sort((a,b)=>a.distanceKm-b.distanceKm)[0]}
    const eta=km=>Math.max(4,Math.round(km/45*60+3));
    function drawRoute(responder){const a=mapPosition(residentLocation.lat,residentLocation.lng),b=mapPosition(responder.lat,responder.lng);el.routeLine.setAttribute("x1",a.x);el.routeLine.setAttribute("y1",a.y);el.routeLine.setAttribute("x2",b.x);el.routeLine.setAttribute("y2",b.y);el.routeLine.style.display="block"}
    function createRequest(){if(!selectedEmergency){showToast(tr("selectEmergency"));return}if(!residentLocation){showToast(tr("shareLocation"));return}const responder=matchResponder(selectedEmergency,residentLocation);currentRequest={id:"DR-"+Date.now().toString().slice(-6),emergencyType:selectedEmergency,residentName:el.residentName.value.trim()||tr("noName"),residentPhone:el.residentPhone.value.trim(),notes:el.residentNotes.value.trim()||tr("noNotes"),location:{...residentLocation},responder,etaMinutes:eta(responder.distanceKm),status:"pending",createdAt:new Date().toISOString()};localStorage.setItem("desertReachCurrentRequest",JSON.stringify(currentRequest));drawRoute(responder);renderRequest();el.resultPanel.classList.add("show");el.resultPanel.scrollIntoView({behavior:"smooth",block:"start"});showToast(tr("requestCreated"))}
    function renderRequest(){if(!currentRequest)return;const role=language==="ar"?currentRequest.responder.roleAr:currentRequest.responder.roleEn;const distanceText=currentRequest.responder.distanceKm.toFixed(2)+" km";const accepted=currentRequest.status==="accepted";const requestTime=new Date(currentRequest.createdAt).toLocaleTimeString(language==="ar"?"ar-AE":"en-AE",{hour:"2-digit",minute:"2-digit"});el.resultPanel.classList.add("show");el.resultRequestId.textContent=tr("requestId")+": "+currentRequest.id;el.residentStatusPill.textContent=accepted?tr("accepted"):tr("waiting");el.matchedResponder.textContent=currentRequest.responder.name;el.matchedRole.textContent=role;el.matchedDistance.textContent=distanceText;el.matchedEta.textContent=currentRequest.etaMinutes+" "+tr("minutes");el.acceptanceTimeline.innerHTML=accepted?'<span class="check">✓</span><span>'+tr("acceptedLine")+'</span>':'<span class="check pending">…</span><span>'+tr("pending")+'</span>';el.requestEmpty.style.display="none";el.requestCard.classList.add("show");el.dashboardOpenRequests.textContent=accepted?"0":"1";el.dashboardAverageDistance.textContent=distanceText;el.dashboardEmergencyType.textContent=emergencyNames[currentRequest.emergencyType][language];el.dashboardRequestTime.textContent=requestTime;el.dashboardRequestId.textContent=currentRequest.id;el.dashboardResidentName.textContent=currentRequest.residentName;el.dashboardCoordinates.textContent=currentRequest.location.lat.toFixed(5)+", "+currentRequest.location.lng.toFixed(5);el.dashboardResponder.textContent=currentRequest.responder.name+" · "+role;el.dashboardDistance.textContent=distanceText;el.dashboardNotes.textContent=currentRequest.notes;el.acceptRequestButton.disabled=accepted;el.acceptRequestButton.textContent=accepted?tr("acceptedButton"):el.acceptRequestButton.getAttribute("data-"+language);drawRoute(currentRequest.responder)}
    function acceptRequest(){if(!currentRequest||currentRequest.status==="accepted")return;currentRequest.status="accepted";currentRequest.acceptedAt=new Date().toISOString();localStorage.setItem("desertReachCurrentRequest",JSON.stringify(currentRequest));renderRequest();showToast(tr("requestAccepted"))}
    function fallback(){if(!currentRequest)return"";return["DESERTREACH HELP REQUEST","Request: "+currentRequest.id,"Type: "+currentRequest.emergencyType,"Location: "+currentRequest.location.lat.toFixed(5)+", "+currentRequest.location.lng.toFixed(5),"Map: https://www.openstreetmap.org/?mlat="+currentRequest.location.lat+"&mlon="+currentRequest.location.lng+"#map=15/"+currentRequest.location.lat+"/"+currentRequest.location.lng,"Name: "+currentRequest.residentName,"Note: "+currentRequest.notes,"Prototype message — verify before real-world use."].join("\n")}
    async function copyFallback(){const m=fallback();if(!m)return;try{await navigator.clipboard.writeText(m);showToast(tr("copied"))}catch(e){window.prompt("Copy this fallback message:",m);showToast(tr("copyError"))}}
    function restore(){const saved=localStorage.getItem("desertReachCurrentRequest");if(!saved)return;try{currentRequest=JSON.parse(saved);residentLocation=currentRequest.location;selectedEmergency=currentRequest.emergencyType;el.emergency.forEach(b=>b.classList.toggle("selected",b.dataset.type===selectedEmergency));setLocation(residentLocation.lat,residentLocation.lng,residentLocation.isDemo);renderRequest()}catch(e){localStorage.removeItem("desertReachCurrentRequest")}}
    el.emergency.forEach(b=>b.addEventListener("click",()=>{selectedEmergency=b.dataset.type;el.emergency.forEach(i=>i.classList.toggle("selected",i===b));updateSubmit()}));
    el.useLocationButton.addEventListener("click",()=>{if(!navigator.geolocation){showToast(tr("locationError"));return}showToast(tr("locating"));navigator.geolocation.getCurrentPosition(p=>{setLocation(p.coords.latitude,p.coords.longitude,false);showToast(tr("locationSuccess"))},()=>showToast(tr("locationError")),{enableHighAccuracy:true,timeout:10000,maximumAge:0})});
    el.demoLocationButton.addEventListener("click",()=>{setLocation(DEMO_CENTER.lat,DEMO_CENTER.lng,true);showToast(tr("demoSuccess"))});
    el.requestHelpButton.addEventListener("click",createRequest);el.acceptRequestButton.addEventListener("click",acceptRequest);el.copyFallbackButton.addEventListener("click",copyFallback);el.openResponderButton.addEventListener("click",()=>switchView("responder"));el.backToResidentButton.addEventListener("click",()=>switchView("resident"));el.residentTab.addEventListener("click",()=>switchView("resident"));el.responderTab.addEventListener("click",()=>switchView("responder"));el.languageButton.addEventListener("click",()=>{language=language==="en"?"ar":"en";applyLanguage()});
    initMap();applyLanguage();restore();
  </script>
