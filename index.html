<!DOCTYPE html>

<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DesertReach helps residents in dispersed rural communities reach the nearest available community responder.">
  <title>DesertReach | Rural Emergency Coordination</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root{
      --green:#087565;--dark:#073f37;--mint:#d7f3ec;--bg:#f7fbf8;--ink:#17211f;
      --muted:#64716e;--line:#dfe8e4;--red:#cf4545;--success:#168554;--white:#fff;
      --shadow:0 18px 50px rgba(21,58,49,.12)
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--ink);
      background:linear-gradient(180deg,#fffdf8,var(--bg));
      font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif
    }
    button,input,textarea{font:inherit}
    button{cursor:pointer}
    .notice{
      padding:9px 16px;
      text-align:center;
      color:#fff;
      background:var(--dark);
      font-size:.82rem;
      font-weight:800
    }
    .app{
      width:min(1180px,calc(100% - 28px));
      margin:auto;
      padding-bottom:48px
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:24px 0 18px
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px
    }
    .logo{
      display:grid;
      place-items:center;
      width:48px;
      height:48px;
      border-radius:15px;
      color:#fff;
      background:linear-gradient(145deg,#0b8d79,var(--dark));
      font-size:1.35rem
    }
    .brand h1{
      margin:0;
      font-size:1.7rem
    }
    .brand p{
      margin:5px 0 0;
      color:var(--muted);
      font-size:.82rem
    }
    .nav{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:8px
    }
    .nav button{
      min-height:42px;
      padding:0 14px;
      border:1px solid var(--line);
      border-radius:12px;
      color:var(--dark);
      background:#fff;
      font-weight:850
    }
    .nav button.active{
      color:#fff;
      border-color:var(--green);
      background:var(--green)
    }
    .view{display:none}
    .view.active{display:block}
    .hero{
      display:grid;
      grid-template-columns:1.35fr .65fr;
      gap:28px;
      align-items:center;
      padding:clamp(28px,5vw,54px);
      border-radius:30px;
      color:#fff;
      background:linear-gradient(110deg,var(--dark),#0b8d79);
      box-shadow:var(--shadow)
    }
    .eyebrow{
      display:inline-block;
      padding:8px 12px;
      border:1px solid rgba(255,255,255,.28);
      border-radius:999px;
      background:rgba(255,255,255,.1);
      font-size:.78rem;
      font-weight:900;
      letter-spacing:.06em;
      text-transform:uppercase
    }
    .hero h2{
      margin:18px 0 12px;
      font-size:clamp(2rem,5vw,4rem);
      line-height:1.03
    }
    .hero p{
      margin:0;
      color:rgba(255,255,255,.84);
      line-height:1.7
    }
    .hero-stats{
      display:grid;
      gap:12px
    }
    .hero-stat{
      padding:18px;
      border:1px solid rgba(255,255,255,.2);
      border-radius:18px;
      background:rgba(255,255,255,.11)
    }
    .hero-stat strong{
      display:block;
      font-size:1.4rem
    }
    .hero-stat span{
      display:block;
      margin-top:5px;
      color:rgba(255,255,255,.76);
      font-size:.82rem
    }
    .section{margin-top:24px}
    .section h3{
      margin:0;
      font-size:clamp(1.4rem,3vw,2rem)
    }
    .section>p{
      margin:6px 0 14px;
      color:var(--muted)
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px
    }
    .card{
      padding:clamp(19px,3vw,28px);
      border:1px solid var(--line);
      border-radius:26px;
      background:#fff;
      box-shadow:0 12px 34px rgba(24,58,49,.08)
    }
    .step{
      display:inline-grid;
      place-items:center;
      min-width:34px;
      height:34px;
      margin-bottom:12px;
      padding:0 9px;
      border-radius:10px;
      color:var(--dark);
      background:var(--mint);
      font-weight:900
    }
    .card h4{
      margin:0 0 7px;
      font-size:1.12rem
    }
    .copy{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.55;
      font-size:.92rem
    }
    .emergency-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px
    }
    .emergency{
      min-height:98px;
      padding:14px 10px;
      border:1px solid var(--line);
      border-radius:15px;
      background:#fff;
      color:var(--ink);
      transition:.18s
    }
    .emergency:hover{
      transform:translateY(-2px);
      border-color:var(--green)
    }
    .emergency.selected{
      border-color:var(--green);
      background:#ecfaf6;
      box-shadow:inset 0 0 0 2px rgba(11,141,121,.12)
    }
    .emergency span{
      display:block;
      margin-bottom:7px;
      font-size:1.5rem
    }
    .emergency strong{font-size:.82rem}
    .location-box{
      padding:16px;
      border:1px dashed #deb875;
      border-radius:16px;
      background:#fffaf1
    }
    .location-status{
      display:flex;
      gap:12px;
      margin-bottom:14px
    }
    .location-icon{
      display:grid;
      place-items:center;
      flex:0 0 40px;
      height:40px;
      border-radius:12px;
      background:#f7ecd8
    }
    .location-status strong{display:block}
    .location-status small{
      display:block;
      margin-top:4px;
      color:var(--muted);
      word-break:break-word
    }
    .row{
      display:flex;
      flex-wrap:wrap;
      gap:9px
    }
    .btn{
      min-height:45px;
      padding:0 16px;
      border:0;
      border-radius:13px;
      font-weight:900
    }
    .primary{
      color:#fff;
      background:var(--green)
    }
    .secondary{
      color:var(--dark);
      background:var(--mint)
    }
    .danger{
      color:#fff;
      background:var(--red)
    }
    .success{
      color:#fff;
      background:var(--success)
    }
    .btn:disabled{
      cursor:not-allowed;
      opacity:.5
    }
    .form{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px
    }
    .field{
      display:grid;
      gap:7px
    }
    .field.full{grid-column:1/-1}
    .field label{
      font-size:.82rem;
      font-weight:850
    }
    .field input,
    .field textarea{
      width:100%;
      padding:12px 13px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fbfcfc;
      outline:none
    }
    .field textarea{
      min-height:88px;
      resize:vertical
    }
    .field input:focus,
    .field textarea:focus{
      border-color:var(--green);
      box-shadow:0 0 0 3px rgba(11,141,121,.1)
    }
    .privacy{
      margin:10px 0 0;
      color:var(--muted);
      font-size:.76rem;
      line-height:1.5
    }
    #map{
      width:100%;
      height:360px;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden
    }
    .legend{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-top:12px;
      color:var(--muted);
      font-size:.78rem
    }
    .dot{
      display:inline-block;
      width:9px;
      height:9px;
      margin-right:6px;
      border-radius:50%
    }
    .dot.red{background:var(--red)}
    .dot.green{background:var(--green)}
    .result{
      display:none;
      margin-top:20px;
      border:1px solid rgba(22,133,84,.25);
      border-radius:24px;
      overflow:hidden;
      background:#eefaf3
    }
    .result.show{display:block}
    .result-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:18px 20px;
      color:#fff;
      background:var(--success)
    }
    .result-head strong{display:block}
    .result-head small{
      display:block;
      margin-top:4px;
      color:rgba(255,255,255,.82)
    }
    .pill{
      align-self:flex-start;
      padding:7px 10px;
      border-radius:999px;
      color:var(--success);
      background:#fff;
      font-size:.74rem;
      font-weight:900
    }
    .result-body{padding:20px}
    .metrics{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px
    }
    .metric{
      padding:13px;
      border:1px solid rgba(22,133,84,.16);
      border-radius:14px;
      background:rgba(255,255,255,.85)
    }
    .metric span{
      display:block;
      color:var(--muted);
      font-size:.72rem
    }
    .metric strong{
      display:block;
      margin-top:5px;
      font-size:.92rem
    }
    .timeline{
      display:grid;
      gap:11px;
      margin:18px 0 0;
      padding:0;
      list-style:none
    }
    .timeline li{
      display:flex;
      gap:10px;
      color:var(--muted);
      font-size:.85rem
    }
    .check{
      display:grid;
      place-items:center;
      flex:0 0 24px;
      height:24px;
      border-radius:50%;
      color:#fff;
      background:var(--success);
      font-size:.72rem;
      font-weight:900
    }
    .check.pending{
      color:#b86a00;
      background:#fff7e5
    }
    .dashboard{
      display:grid;
      grid-template-columns:.8fr 1.2fr;
      gap:20px
    }
    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px
    }
    .stat{
      padding:16px;
      border-radius:15px;
      background:#ecfaf6
    }
    .stat strong{
      display:block;
      color:var(--dark);
      font-size:1.3rem
    }
    .stat span{
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-size:.76rem
    }
    .empty{
      padding:36px 18px;
      border:1px dashed var(--line);
      border-radius:16px;
      text-align:center;
      color:var(--muted);
      background:#fbfcfc
    }
    .request-card{
      display:none;
      border:1px solid rgba(207,69,69,.2);
      border-radius:18px;
      overflow:hidden
    }
    .request-card.show{display:block}
    .request-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:15px 17px;
      color:var(--red);
      background:#fff0f0
    }
    .request-body{padding:17px}
    .request-details{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:15px
    }
    .detail{
      padding:11px;
      border-radius:12px;
      background:#f7f9f8
    }
    .detail span{
      display:block;
      color:var(--muted);
      font-size:.69rem;
      font-weight:750
    }
    .detail strong{
      display:block;
      margin-top:4px;
      font-size:.84rem;
      word-break:break-word
    }
    .proofs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px
    }
    .proof{
      padding:20px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff
    }
    .proof b{
      display:block;
      margin:8px 0
    }
    .proof p{
      margin:0;
      color:var(--muted);
      font-size:.83rem;
      line-height:1.55
    }
    footer{
      display:flex;
      justify-content:space-between;
      gap:20px;
      margin-top:32px;
      padding-top:24px;
      border-top:1px solid var(--line);
      color:var(--muted);
      font-size:.78rem
    }
    .toast{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:9999;
      max-width:390px;
      padding:14px 16px;
      border-radius:14px;
      color:#fff;
      background:var(--dark);
      box-shadow:var(--shadow);
      opacity:0;
      transform:translateY(14px);
      pointer-events:none;
      transition:.22s
    }
    .toast.show{
      opacity:1;
      transform:none
    }
    [dir="rtl"] .toast{
      right:auto;
      left:18px
    }
    @media(max-width:900px){
      .hero,.grid,.dashboard{grid-template-columns:1fr}
      .hero-stats{grid-template-columns:repeat(3,1fr)}
      .metrics{grid-template-columns:1fr 1fr}
    }
    @media(max-width:650px){
      .app{width:calc(100% - 18px)}
      header{align-items:flex-start}
      .brand p{display:none}
      .hero{
        padding:26px 20px;
        border-radius:23px
      }
      .hero-stats,.emergency-grid,.proofs{grid-template-columns:1fr 1fr}
      .form,.request-details{grid-template-columns:1fr}
      .field.full{grid-column:auto}
      #map{height:310px}
      footer{flex-direction:column}
    }
    @media(max-width:430px){
      .hero-stats,.emergency-grid,.proofs,.stats,.metrics{grid-template-columns:1fr}
    }
  </style>
</head>

    function rad(value) {
      return value * Math.PI / 180;
    }

    function distance(lat1, lng1, lat2, lng2) {
      const earthRadius = 6371;
      const latitudeDifference = rad(lat2 - lat1);
      const longitudeDifference = rad(lng2 - lng1);

      const calculation =
        Math.sin(latitudeDifference / 2) ** 2 +
        Math.cos(rad(lat1)) *
          Math.cos(rad(lat2)) *
          Math.sin(longitudeDifference / 2) ** 2;

      return (
        earthRadius *
        2 *
        Math.atan2(
          Math.sqrt(calculation),
          Math.sqrt(1 - calculation)
        )
      );
    }

    function matchResponder(type, location) {
      return responders
        .filter(responder => responder.types.includes(type))
        .map(responder => ({
          ...responder,
          distanceKm: distance(
            location.lat,
            location.lng,
            responder.lat,
            responder.lng
          )
        }))
        .sort(
          (firstResponder, secondResponder) =>
            firstResponder.distanceKm -
            secondResponder.distanceKm
        )[0];
    }

    function eta(distanceKm) {
      return Math.max(
        4,
        Math.round(distanceKm / 45 * 60 + 3)
      );
    }

        {
          color: "#0b8d79",
          weight: 4,
          dashArray: "8 8",
          opacity: 0.88
        }
      ).addTo(map);

      map.fitBounds(
        L.latLngBounds(
          [
            [residentLocation.lat, residentLocation.lng],
            [responder.lat, responder.lng]
          ]
        ).pad(0.35)
      );
    }

    async function copyFallback() {
      const message = fallback();

      if (!message) {
        return;
      }

      try {
        await navigator.clipboard.writeText(message);
        showToast(tr("copied"));
      } catch (error) {
        window.prompt(
          "Copy this fallback message:",
          message
        );

        showToast(tr("copyError"));
      }
    }

    function restore() {
      const saved =
        localStorage.getItem(
          "desertReachCurrentRequest"
        );

      if (!saved) {
        return;
      }

      try {
        currentRequest = JSON.parse(saved);
        residentLocation = currentRequest.location;
        selectedEmergency =
          currentRequest.emergencyType;

        el.emergency.forEach(button => {
          button.classList.toggle(
            "selected",
            button.dataset.type ===
              selectedEmergency
          );
        });

        setLocation(
          residentLocation.lat,
          residentLocation.lng,
          residentLocation.isDemo
        );

        renderRequest();
      } catch (error) {
        localStorage.removeItem(
          "desertReachCurrentRequest"
        );
      }
    }

    el.emergency.forEach(button => {
      button.addEventListener("click", () => {
        selectedEmergency =
          button.dataset.type;

        el.emergency.forEach(item => {
          item.classList.toggle(
            "selected",
            item === button
          );
        });

        updateSubmit();
      });
    });

    el.useLocationButton.addEventListener(
      "click",
      () => {
        if (!navigator.geolocation) {
          showToast(tr("locationError"));
          return;
        }

        showToast(tr("locating"));

        navigator.geolocation.getCurrentPosition(
          position => {
            setLocation(
              position.coords.latitude,
              position.coords.longitude,
              false
            );

            showToast(tr("locationSuccess"));
          },
          () => {
            showToast(tr("locationError"));
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
          }
        );
      }
    );

    el.demoLocationButton.addEventListener(
      "click",
      () => {
        setLocation(
          DEMO_CENTER.lat,
          DEMO_CENTER.lng,
          true
        );

        showToast(tr("demoSuccess"));
      }
    );

    el.requestHelpButton.addEventListener(
      "click",
      createRequest
    );

    el.acceptRequestButton.addEventListener(
      "click",
      acceptRequest
    );

    el.copyFallbackButton.addEventListener(
      "click",
      copyFallback
    );

    el.openResponderButton.addEventListener(
      "click",
      () => switchView("responder")
    );

    el.backToResidentButton.addEventListener(
      "click",
      () => switchView("resident")
    );

    el.residentTab.addEventListener(
      "click",
      () => switchView("resident")
    );

    el.responderTab.addEventListener(
      "click",
      () => switchView("responder")
    );

    el.languageButton.addEventListener(
      "click",
      () => {
        language =
          language === "en"
            ? "ar"
            : "en";

        applyLanguage();
      }
    );

    initMap();
    applyLanguage();
    restore();
  </script>

</body>
</html>
